<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>全能播放器 + ESPN比分</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#0f172a; color:white; font-family:Arial; }

/* 輸入 */
.input-box {
  display:flex;
  padding:10px;
  background:#111827;
}
input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}
button {
  margin-left:10px;
  padding:10px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
}

/* 播放 */
.video-box {
  width:100%;
  height:220px;
  background:black;
}

/* 歷史 */
.history {
  display:flex;
  overflow-x:auto;
  background:#1f2937;
  padding:8px;
}
.h-btn {
  margin-right:8px;
  padding:8px 12px;
  background:#374151;
  border:none;
  border-radius:6px;
  color:white;
}

/* 解析 */
.parse-box {
  padding:10px;
  background:#020617;
}
.result-item {
  background:#111827;
  margin-top:10px;
  padding:10px;
  border-radius:6px;
  font-size:12px;
  word-break:break-all;
}
.copy-btn {
  margin-top:6px;
  padding:4px 8px;
  background:#10b981;
  border:none;
  border-radius:4px;
  color:white;
}

/* 比分 */
.score-box {
  padding:10px;
  font-size:13px;
}
.league {
  margin-top:10px;
  padding-top:5px;
  border-top:1px solid #374151;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- 🎥 播放 -->
<div class="input-box">
  <input id="url" placeholder="貼 m3u8 或播放頁">
  <button onclick="playInput()">播放</button>
</div>

<div class="history" id="history"></div>
<div class="video-box" id="playerBox"></div>

<!-- 🔍 解析 -->
<div class="parse-box">
  <div class="input-box" style="padding:0;">
    <input id="parseUrl" placeholder="貼網址 → 列出全部源">
    <button onclick="handleParse()">解析</button>
  </div>
  <div id="resultList"></div>
</div>

<!-- 📊 ESPN -->
<div class="score-box" id="scores">載入比分...</div>

<script>
let hls;
const HISTORY_KEY = "stream_history";

/* =========================
   🎥 播放（40秒穩定版）
========================= */
function playInput() {
  const input = document.getElementById("url");
  const url = input.value.trim();
  if (!url) return;
  play(url);
  input.value = "";
}

function play(url) {
  saveHistory(url);
  renderHistory();

  const box = document.getElementById("playerBox");

  if (url.includes(".m3u8")) {

    box.innerHTML = `<video id="video" controls autoplay muted playsinline style="width:100%;height:100%;"></video>`;
    const video = document.getElementById("video");

    if (hls) { hls.destroy(); }

    if (Hls.isSupported()) {

      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        liveSyncDuration: 30,
        liveMaxLatencyDuration: 50
      });

      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.LEVEL_LOADED, function(event, data) {
        if (data.details.live) {
          video.currentTime = data.details.edge - 40;
        }
      });

      setInterval(() => {
        if (!video.duration) return;

        let delay = video.duration - video.currentTime;

        if (delay < 30) {
          video.currentTime = video.duration - 40;
        }

        if (delay > 55) {
          video.playbackRate = 1.05;
        } else {
          video.playbackRate = 1;
        }

      }, 5000);

      video.addEventListener("waiting", () => {
        video.currentTime = video.duration - 35;
      });

    } else {
      video.src = url;
    }

  } else {
    box.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;" frameborder="0"></iframe>`;
  }
}

/* =========================
   🕘 歷史
========================= */
function getHistory() {
  return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
}
function saveHistory(url) {
  let list = getHistory().filter(u => u !== url);
  list.unshift(url);
  if (list.length > 5) list = list.slice(0,5);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
}
function renderHistory() {
  const box = document.getElementById("history");
  box.innerHTML = "";
  getHistory().forEach((url, i) => {
    let btn = document.createElement("button");
    btn.className = "h-btn";
    btn.innerText = i+1;
    btn.onclick = () => play(url);
    box.appendChild(btn);
  });
}

/* =========================
   🔍 全源解析
========================= */
async function handleParse() {
  const url = document.getElementById("parseUrl").value.trim();
  if (!url) return;

  let results = new Set();

  try {
    if (url.match(/\.(m3u8|flv|mp4)/)) results.add(url);

    const res = await fetch(url);
    const text = await res.text();

    (text.match(/https?:\/\/[^"' ]+\.m3u8[^"' ]*/g)||[]).forEach(u=>results.add(u));
    (text.match(/https?:\/\/[^"' ]+\.(flv|mp4)[^"' ]*/g)||[]).forEach(u=>results.add(u));

    (text.match(/<iframe[^>]+src=["']([^"']+)["']/gi)||[]).forEach(tag=>{
      let s=tag.match(/src=["']([^"']+)["']/i);
      if(s) results.add(s[1]);
    });

  } catch(e){}

  renderResults([...results]);
}

function renderResults(list) {
  const box = document.getElementById("resultList");
  if (!list.length) return box.innerHTML="❌ 沒抓到";

  box.innerHTML="";
  list.forEach(url=>{
    let div=document.createElement("div");
    div.className="result-item";
    div.innerHTML=`
      ${url}
      <br>
      <button class="copy-btn" onclick="copyText('${url}')">複製</button>
    `;
    box.appendChild(div);
  });
}

function copyText(t){navigator.clipboard.writeText(t);alert("已複製");}

/* =========================
   📊 ESPN 全運動比分
========================= */
const sports = [
  {name:"🏀 NBA", url:"basketball/nba"},
  {name:"🏈 NFL", url:"football/nfl"},
  {name:"⚾ MLB", url:"baseball/mlb"},
  {name:"⚽ 足球", url:"soccer/eng.1"}
];

async function loadScores() {
  let html="";

  for (let s of sports) {
    try {
      let res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${s.url}/scoreboard`);
      let data = await res.json();

      html += `<div class="league">${s.name}</div>`;

      data.events.forEach(g=>{
        let c=g.competitions[0];
        let home=c.competitors.find(t=>t.homeAway==="home");
        let away=c.competitors.find(t=>t.homeAway==="away");

        html += `
          ${away.team.displayName} ${away.score}<br>
          ${home.team.displayName} ${home.score}<br><br>
        `;
      });

    } catch(e){}
  }

  document.getElementById("scores").innerHTML = html || "無比賽";
}

renderHistory();
loadScores();
setInterval(loadScores,10000);
</script>

</body>
</html>
