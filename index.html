<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clean Player + History + Scores</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
}

/* 輸入 */
.input-box {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
}

button {
  margin-left: 10px;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 6px;
}

/* 播放器 */
.video-box {
  width: 100%;
  height: 220px;
  background: black;
}

video {
  width: 100%;
  height: 100%;
}

/* 歷史按鈕 */
.history {
  display: flex;
  overflow-x: auto;
  background: #1f2937;
  padding: 8px;
}

.h-btn {
  flex-shrink: 0;
  margin-right: 8px;
  padding: 8px 10px;
  background: #374151;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 12px;
}

/* 比分 */
.score-box {
  padding: 10px;
  font-size: 14px;
  line-height: 1.6;
}

.match {
  padding: 8px 0;
  border-bottom: 1px solid #1f2937;
}
</style>
</head>

<body>

<!-- 🔗 輸入 -->
<div class="input-box">
  <input id="url" placeholder="輸入 m3u8 URL">
  <button onclick="playInput()">播放</button>
</div>

<!-- 🕘 歷史 -->
<div class="history" id="history"></div>

<!-- 🎥 播放器 -->
<div class="video-box">
  <video id="video" controls autoplay muted playsinline></video>
</div>

<!-- 📊 比分 -->
<div class="score-box" id="scores">載入比分中...</div>

<script>
let hls;
const video = document.getElementById("video");

const HISTORY_KEY = "stream_history";

/* =========================
   🎥 播放
========================= */
function playStream(url) {
  if (!url) return;

  saveHistory(url);
  renderHistory();

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (url.includes(".m3u8")) {
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else {
      video.src = url;
    }
  } else {
    video.src = url;
  }
}

function playInput() {
  const url = document.getElementById("url").value.trim();
  playStream(url);
}

/* =========================
   🕘 歷史記錄（最多5個）
========================= */
function getHistory() {
  return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
}

function saveHistory(url) {
  let list = getHistory();

  list = list.filter(u => u !== url);
  list.unshift(url);

  if (list.length > 5) list = list.slice(0, 5);

  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
}

function renderHistory() {
  const box = document.getElementById("history");
  const list = getHistory();

  box.innerHTML = "";

  list.forEach(url => {
    const btn = document.createElement("button");
    btn.className = "h-btn";
    btn.innerText = "播放";
    btn.onclick = () => playStream(url);
    box.appendChild(btn);
  });
}

/* =========================
   📊 ESPN 比分
========================= */
async function loadScores() {
  try {
    const res = await fetch(
      "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard"
    );

    const data = await res.json();

    let html = "";

    data.events.forEach(game => {
      const c = game.competitions[0];
      const home = c.competitors.find(t => t.homeAway === "home");
      const away = c.competitors.find(t => t.homeAway === "away");

      html += `
        <div class="match">
          🏀 ${away.team.displayName} ${away.score}
          <br>
          🏠 ${home.team.displayName} ${home.score}
        </div>
      `;
    });

    document.getElementById("scores").innerHTML = html;

  } catch {
    document.getElementById("scores").innerHTML = "比分載入失敗";
  }
}

/* =========================
   🚀 初始化
========================= */
renderHistory();
loadScores();
setInterval(loadScores, 10000);
</script>

</body>
</html>
