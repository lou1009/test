<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE Sports Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
}

/* 播放器 */
.video-box {
  position: relative;
  width: 100%;
  height: 220px;
  background: black;
}

video {
  width: 100%;
  height: 100%;
}

/* LIVE */
.live {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 5px 10px;
  font-size: 12px;
  border-radius: 6px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0.4;}
}

/* 按鈕 */
.list {
  display: flex;
  overflow-x: auto;
  background: #111827;
}

.btn {
  padding: 10px;
  margin: 5px;
  background: #1f2937;
  border: none;
  color: white;
  border-radius: 6px;
  flex-shrink: 0;
}

/* 比分 */
.score {
  padding: 10px;
}

.game {
  border-bottom: 1px solid #1f2937;
  padding: 8px 0;
}

.team {
  display: flex;
  justify-content: space-between;
}

.live-score {
  color: red;
  animation: blink 1s infinite;
}
</style>
</head>

<body>

<!-- 🎥 播放器 -->
<div class="video-box">
  <div class="live">LIVE</div>
  <video id="video" controls autoplay muted playsinline></video>
</div>

<!-- 🔘 7個來源 -->
<div class="list" id="list"></div>

<!-- 📊 比分 -->
<div class="score" id="score"></div>

<script>
const video = document.getElementById("video");

const sources = [
  "https://play1nm.hnyongshun.cn/live/bdf3e5442ed29ff31b23b47491760b27.m3u8",
  "https://play1nm.hnyongshun.cn/live/5ac950a0f8301ff31b23b47491760b27.m3u8",
  "https://play1nm.hnyongshun.cn/live/044738dfef28c9ae1ccbc6e3562961c0.m3u8",
  "https://play.88player.top/m3u8.html?url=https://play1nm.hnyongshun.cn/live/5ac950a0f8301ff31b23b47491760b27.m3u8",
  "https://play.88player.top/m3u8.html?url=https://play1nm.hnyongshun.cn/live/044738dfef28c9ae1ccbc6e3562961c0.m3u8",
  "http://play.sportsteam368.com/play/kbs.html?id=vl&id2=?assdd",
  "https://iptv345.com/?act=play&token=44811894c1344b5e905e18f9c10398b1&tid=ty&id=24"
];

let hls;

// 🎥 播放
function play(url) {

  if (hls) hls.destroy();

  // iframe 類直接開（無法 HLS）
  if (url.includes("iptv345") || url.includes("sportsteam") || url.includes("88player")) {
    window.open(url, "_blank");
    return;
  }

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

// 🔘 按鈕
const list = document.getElementById("list");

sources.forEach((s, i) => {
  const btn = document.createElement("button");
  btn.className = "btn";
  btn.innerText = "源 " + (i+1);
  btn.onclick = () => play(s);
  list.appendChild(btn);
});

// 預設第一個
play(sources[0]);

// 📊 ESPN比分
async function loadScore() {
  try {
    const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard");
    const data = await res.json();

    let html = "";

    data.events.forEach(g => {
      const c = g.competitions[0];
      const home = c.competitors.find(t => t.homeAway === "home");
      const away = c.competitors.find(t => t.homeAway === "away");
      const live = g.status.type.state === "in";

      html += `
        <div class="game">
          <div class="team">
            <div>${away.team.displayName}</div>
            <div class="${live ? "live-score" : ""}">${away.score}</div>
          </div>

          <div class="team">
            <div>${home.team.displayName}</div>
            <div class="${live ? "live-score" : ""}">${home.score}</div>
          </div>

          <div>${g.status.type.shortDetail}</div>
        </div>
      `;
    });

    document.getElementById("score").innerHTML = html;

  } catch {
    document.getElementById("score").innerHTML = "比分載入失敗";
  }
}

loadScore();
setInterval(loadScore, 10000);
</script>

</body>
</html>
