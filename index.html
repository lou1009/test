<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>台股掃盤排行榜</title>
<style>
body{background:#0b1220;color:#e5e7eb;font-family:sans-serif;padding:20px}

button{
  padding:10px 18px;
  background:#22c55e;
  border:0;
  color:#fff;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.card{
  background:#111827;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border-left:4px solid #3b82f6;
}

.a{border-left-color:#22c55e}
.b{border-left-color:#fbbf24}
.c{border-left-color:#3b82f6}

.small{font-size:12px;color:#94a3b8}

.rank{
  font-weight:800;
  margin-right:8px;
}

.topbar{
  margin:10px 0;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>
<body>

<h2>📊 台股掃盤排行榜（TOP版）</h2>

<button onclick="scan()">開始掃描</button>

<div class="topbar" id="status">尚未掃描</div>
<div id="list"></div>

<script>
let code = 1101;

/* ===== 抓資料 ===== */
async function getData(c){
    const url = `https://stooq.com/q/d/l/?s=${c}.tw&i=d`;
    const res = await fetch(url);
    const txt = await res.text();

    const rows = txt.split("\n").slice(1);

    return rows.map(r=>{
        const x = r.split(",");
        return +x[4];
    }).filter(x=>x);
}

/* ===== EMA ===== */
function ema(arr,n){
    let k=2/(n+1),out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k+out[i-1]*(1-k));
    }
    return out;
}

/* ===== MACD ===== */
function macd(arr){
    const e12=ema(arr,12);
    const e26=ema(arr,26);
    const dif=e12.map((v,i)=>v-e26[i]);
    const dea=ema(dif,9);
    return dif.map((v,i)=>v-dea[i]);
}

/* ===== 評分 ===== */
function score(close){
    if(close.length<30) return 0;

    let s=0;
    const m=macd(close);

    if(m.at(-1)>0 && m.at(-2)<0) s+=40;

    const ma20=close.slice(-20).reduce((a,b)=>a+b)/20;
    if(close.at(-1)>ma20) s+=30;

    const high20=Math.max(...close.slice(-20));
    if(close.at(-1)>=high20) s+=30;

    return s;
}

/* ===== 掃市場（範圍） ===== */
async function scan(){
    const results = [];

    document.getElementById("list").innerHTML = "";

    for(let i=1101;i<1300;i++){   // 先掃一段（避免爆）
        document.getElementById("status").innerText = `掃描中：${i}`;

        try{
            const data = await getData(i);
            if(data.length < 30) continue;

            const s = score(data);
            const price = data.at(-1);

            if(s > 0){
                results.push({
                    code:i,
                    score:s,
                    price
                });
            }

        }catch(e){}

        await new Promise(r=>setTimeout(r,80));
    }

    /* ===== 排行榜排序 ===== */
    results.sort((a,b)=>b.score - a.score);

    /* ===== 取 TOP 20 ===== */
    const top = results.slice(0,20);

    top.forEach((x,idx)=>{
        let cls = "c";
        if(x.score >= 80) cls = "a";
        else if(x.score >= 60) cls = "b";

        const div = document.createElement("div");
        div.className = "card " + cls;

        div.innerHTML = `
            <span class="rank">#${idx+1}</span>
            <b>${x.code}</b>
            <div class="small">
                價格 ${x.price} ｜ 評分 ${x.score}
            </div>
        `;

        document.getElementById("list").appendChild(div);
    });

    document.getElementById("status").innerText =
        `完成｜共掃 ${results.length} 檔｜顯示TOP ${top.length}`;
}
</script>

</body>
</html>
