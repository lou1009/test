<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>直播 + 多源切換 + ESPN比分</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
}

/* 播放器 */
.video-container {
  position: relative;
  width: 100%;
  height: 220px;
  background: black;
}

video, iframe {
  width: 100%;
  height: 100%;
}

/* LIVE */
.live-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
}

.live-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  margin-right: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity:0;}
}

/* 切換按鈕 */
.source-list {
  display: flex;
  overflow-x: auto;
  background: #020617;
}

.source-btn {
  padding: 10px;
  border: none;
  background: #1e293b;
  color: white;
  margin: 5px;
  border-radius: 6px;
}

/* 比分 */
.score-board {
  padding: 10px;
}

.game {
  border-bottom: 1px solid #1e293b;
  padding: 10px 0;
}

.team {
  display: flex;
  justify-content: space-between;
}

.score.live {
  color: red;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  50% {opacity:0.5;}
}
</style>
</head>

<body>

<!-- 🎥 播放器 -->
<div class="video-container" id="playerBox">
  <div class="live-badge"><span class="live-dot"></span>LIVE</div>

  <!-- 主播放器 -->
  <video id="video" controls autoplay muted playsinline webkit-playsinline></video>

  <!-- iframe播放器 -->
  <iframe id="iframePlayer" style="display:none;" allowfullscreen></iframe>
</div>

<!-- 🔘 切換源 -->
<div class="source-list">
  <button class="source-btn" onclick="playM3U8()">主源</button>
  <button class="source-btn" onclick="playIframe(1)">備源1</button>
  <button class="source-btn" onclick="playIframe(2)">備源2</button>
  <button class="source-btn" onclick="playIframe(3)">備源3</button>
</div>

<!-- 📊 比分 -->
<div class="score-board" id="scoreBoard"></div>

<script>
const video = document.getElementById("video");
const iframe = document.getElementById("iframePlayer");

// 🎥 主 m3u8
const mainSrc = "https://play1nm.hnyongshun.cn/live/bdf3e5442ed29fc2e9c9cc05b4947dc2.m3u8";

// 🎥 iframe 源
const iframeSources = [
  "http://play.sportsteam368.com/play/kbs.html?id=vl&id2=?assdd",
  "https://iptv345.com/?act=play&token=44811894c1344b5e905e18f9c10398b1&tid=ty&id=24",
  "https://iptv345.com/?act=play&token=532cc9f38272b7657e1f287fead8f866&tid=ty&id=28"
];

// 🔥 播放 m3u8
function playM3U8() {
  iframe.style.display = "none";
  video.style.display = "block";

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(mainSrc);
    hls.attachMedia(video);
  } else {
    video.src = mainSrc;
  }
}

// 🔥 播放 iframe
function playIframe(i) {
  video.style.display = "none";
  iframe.style.display = "block";
  iframe.src = iframeSources[i-1];
}

// 預設主源
playM3U8();

// 📊 ESPN比分
async function loadScore() {
  try {
    const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard");
    const data = await res.json();

    let html = "";

    data.events.forEach(game => {
      const comp = game.competitions[0];
      const home = comp.competitors.find(t => t.homeAway === "home");
      const away = comp.competitors.find(t => t.homeAway === "away");
      const isLive = game.status.type.state === "in";

      html += `
        <div class="game">
          <div class="team">
            <div>${away.team.displayName}</div>
            <div class="score ${isLive ? "live" : ""}">${away.score}</div>
          </div>

          <div class="team">
            <div>${home.team.displayName}</div>
            <div class="score ${isLive ? "live" : ""}">${home.score}</div>
          </div>

          <div>${game.status.type.shortDetail}</div>
        </div>
      `;
    });

    document.getElementById("scoreBoard").innerHTML = html;

  } catch {
    document.getElementById("scoreBoard").innerHTML = "比分讀取失敗";
  }
}

loadScore();
setInterval(loadScore, 10000);
</script>

</body>
</html>
