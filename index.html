<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>全台股掃盤（單檔HTML版）</title>
<style>
body {
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial;
    padding:20px;
}
button {
    padding:10px 20px;
    background:#22c55e;
    border:none;
    color:white;
    cursor:pointer;
}
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
td,th {
    padding:8px;
    border-bottom:1px solid #334155;
    text-align:center;
}
.up {color:#22c55e;}
.down {color:#ef4444;}
</style>
</head>
<body>

<h2>📈 AI 掃盤（HTML單機版）</h2>
<button onclick="scan()">開始掃描</button>
<div id="status"></div>

<table>
<thead>
<tr>
<th>代號</th>
<th>價格</th>
<th>漲幅%</th>
<th>成交量</th>
<th>MACD</th>
<th>分數</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>

// ===== 工具 =====
const delay = ms => new Promise(r=>setTimeout(r,ms));

function ema(arr, p){
    let k = 2/(p+1);
    let out = [arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k + out[i-1]*(1-k));
    }
    return out;
}

function macd(arr){
    let e12 = ema(arr,12);
    let e26 = ema(arr,26);
    return e12.map((v,i)=>v-e26[i]).at(-1);
}

function score({price, change, vol, macd}){
    let s = 0;
    if(macd > 0) s += 40;
    if(change > 0) s += 20;
    if(vol > 2000) s += 20;
    if(price <= 30) s += 20;
    return s;
}

// ===== API =====
async function getStockList(){
    let r = await fetch("https://api.finmindtrade.com/api/v4/data",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({dataset:"TaiwanStockInfo"})
    });
    let j = await r.json();
    return j.data.map(s=>s.stock_id);
}

async function getQuote(id){
    try{
        let r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW`);
        let j = await r.json();
        let m = j.chart.result[0].meta;

        return {
            price: m.regularMarketPrice,
            vol: m.regularMarketVolume,
            change: ((m.regularMarketPrice - m.previousClose)/m.previousClose)*100
        };
    }catch{return null;}
}

async function getHistory(id){
    try{
        let r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?range=3mo&interval=1d`);
        let j = await r.json();
        return j.chart.result[0].indicators.quote[0].close.filter(Boolean);
    }catch{return null;}
}

// ===== 主掃描 =====
async function scan(){

    const status = document.getElementById("status");
    const table = document.getElementById("data");

    table.innerHTML = "";
    status.innerText = "取得股票清單...";

    let list = await getStockList();

    // 👉 控制數量（純HTML極限）
    let sample = list.slice(0, 300);

    let results = [];

    for(let i=0;i<sample.length;i++){

        let id = sample[i];
        status.innerText = `掃描中 ${i}/${sample.length}`;

        let quote = await Promise.race([
            getQuote(id),
            delay(3000).then(()=>null)
        ]);

        if(!quote) continue;
        if(quote.price > 30) continue;

        let history = await Promise.race([
            getHistory(id),
            delay(3000).then(()=>null)
        ]);

        if(!history || history.length < 30) continue;

        let m = macd(history);

        let s = score({
            price: quote.price,
            change: quote.change,
            vol: quote.vol,
            macd: m
        });

        if(s >= 60){
            results.push({
                id,
                price: quote.price,
                change: quote.change.toFixed(2),
                vol: quote.vol,
                macd: m.toFixed(2),
                score: s
            });
        }

        // 👉 每10筆更新畫面（不卡）
        if(i % 10 === 0){
            render(results);
        }

        if(i % 20 === 0){
            await delay(1000);
        }
    }

    render(results);
    status.innerText = "掃描完成";
}

// ===== 顯示 =====
function render(results){

    results.sort((a,b)=>b.score-a.score);

    document.getElementById("data").innerHTML =
        results.map(s=>`
        <tr>
            <td>${s.id}</td>
            <td>${s.price}</td>
            <td class="${s.change>0?'up':'down'}">${s.change}%</td>
            <td>${s.vol}</td>
            <td>${s.macd}</td>
            <td>${s.score}</td>
        </tr>
    `).join("");
}

</script>

</body>
</html>
