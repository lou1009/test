<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股技術掃盤 PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body{background:#0b0e14;color:#e2e8f4;font-family:Arial;padding:20px}
input,button{padding:10px;border-radius:6px;border:1px solid #333}
button{background:#4f8ef7;color:white;cursor:pointer}
.card{background:#111827;margin-top:10px;padding:12px;border-radius:8px}
.up{color:#34c77b}.down{color:#f05c5c}
</style>
</head>

<body>

<h2>📊 台股掃盤 PRO（穩定版）</h2>

<input id="code" placeholder="2330">
<button onclick="run()">分析</button>

<div id="out"></div>

<script>

const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* ======================
   ✔ 穩定資料來源（Yahoo）
====================== */
async function getData(id){
  try{
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?range=3mo&interval=1d`;

    const r = await fetch(url);
    const j = await r.json();

    const res = j?.chart?.result?.[0];
    if(!res) return null;

    const close = res.indicators.quote[0].close.filter(Boolean);
    const price = res.meta.regularMarketPrice;

    return {close, price};

  }catch(e){
    return null;
  }
}

/* ======================
   ✔ MACD（簡化穩定版）
====================== */
function ema(arr, p){
  let k = 2/(p+1);
  let out=[arr[0]];
  for(let i=1;i<arr.length;i++){
    out.push(arr[i]*k + out[i-1]*(1-k));
  }
  return out;
}

function macd(close){
  let dif = ema(close,12).map((v,i)=>v - ema(close,26)[i]);
  let dea = ema(dif,9);
  let hist = dif.map((v,i)=>v - dea[i]);
  return hist;
}

/* ======================
   ✔ 評分（簡化穩定）
====================== */
function score(close, price){

  let s=0;

  let ma5 = close.slice(-5).reduce((a,b)=>a+b)/5;
  let ma20 = close.slice(-20).reduce((a,b)=>a+b)/20;

  if(price > ma5) s += 30;
  if(price > ma20) s += 30;

  let h = Math.max(...close.slice(-10));
  if(price >= h) s += 40;

  let hist = macd(close);
  if(hist.at(-1) > 0 && hist.at(-2) < 0) s += 30;

  return s;
}

/* ======================
   ✔ UI
====================== */
function show(id, price, sc){
  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <b>${id}</b><br>
    價格：${price}<br>
    分數：${sc}
  `;

  document.getElementById("out").prepend(div);
}

/* ======================
   ✔ 主程式
====================== */
async function run(){

  const id = document.getElementById("code").value.trim();

  document.getElementById("out").innerHTML="";

  const data = await getData(id);

  if(!data){
    alert("抓不到資料（Yahoo API）");
    return;
  }

  const sc = score(data.close, data.price);

  show(id, data.price, sc);
}

</script>

</body>
</html>
