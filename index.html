<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA 世界盃</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --dark: #080C14;
    --dark2: #0D1420;
    --dark3: #111B2A;
    --accent: #1A6FD8;
    --accent2: #00CFFF;
    --red: #E03030;
    --green: #00C878;
    --text: #D4DFF0;
    --muted: #6A7E99;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Barlow Condensed’, ‘Noto Sans TC’, sans-serif;
background: var(–dark);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* Background */
body::before {
content: ‘’;
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background:
radial-gradient(ellipse at 20% 20%, rgba(26,111,216,0.12) 0%, transparent 60%),
radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 60%);
pointer-events: none;
z-index: 0;
}

.content { position: relative; z-index: 1; }

/* Header */
header {
padding: 32px 24px 20px;
text-align: center;
border-bottom: 1px solid rgba(201,168,76,0.2);
background: linear-gradient(180deg, rgba(201,168,76,0.05) 0%, transparent 100%);
}

.tournament-logo {
display: flex;
align-items: center;
justify-content: center;
gap: 16px;
margin-bottom: 4px;
}

.ball-icon {
width: 44px; height: 44px;
background: radial-gradient(circle at 35% 35%, #fff 0%, #ccc 60%, #888 100%);
border-radius: 50%;
position: relative;
flex-shrink: 0;
box-shadow: 0 0 20px rgba(201,168,76,0.4);
animation: spin 8s linear infinite;
}

@keyframes spin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

.ball-icon::before {
content: ‘’;
position: absolute;
top: 12px; left: 6px;
width: 14px; height: 14px;
background: #333;
clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
border-radius: 2px;
}

h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(2.2rem, 6vw, 4rem);
letter-spacing: 0.08em;
line-height: 1;
background: linear-gradient(135deg, var(–gold-light), var(–gold));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.subtitle {
font-size: 0.85rem;
color: var(–muted);
letter-spacing: 0.3em;
text-transform: uppercase;
margin-top: 6px;
}

.host-flags {
display: flex;
justify-content: center;
gap: 8px;
margin-top: 14px;
font-size: 1.6rem;
}

.host-label {
font-size: 0.7rem;
color: var(–muted);
letter-spacing: 0.2em;
text-align: center;
margin-top: 4px;
}

/* Status bar */
.status-bar {
display: flex;
justify-content: center;
gap: 32px;
padding: 14px 24px;
background: rgba(13,20,32,0.8);
border-bottom: 1px solid rgba(255,255,255,0.05);
flex-wrap: wrap;
font-size: 0.8rem;
color: var(–muted);
letter-spacing: 0.05em;
}

.status-item {
display: flex;
align-items: center;
gap: 6px;
}

.status-dot {
width: 7px; height: 7px;
border-radius: 50%;
background: var(–green);
animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.5; transform: scale(0.7); }
}

/* Countdown */
.countdown-section {
padding: 28px 24px;
text-align: center;
border-bottom: 1px solid rgba(255,255,255,0.05);
}

.countdown-label {
font-size: 0.7rem;
letter-spacing: 0.3em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 14px;
}

.countdown-grid {
display: flex;
justify-content: center;
gap: 16px;
flex-wrap: wrap;
}

.countdown-unit {
background: var(–dark3);
border: 1px solid rgba(201,168,76,0.2);
border-radius: 8px;
padding: 14px 20px;
min-width: 80px;
}

.countdown-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2.4rem;
color: var(–gold);
line-height: 1;
display: block;
}

.countdown-unit-label {
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 0.2em;
text-transform: uppercase;
margin-top: 4px;
}

/* Tabs */
.tabs {
display: flex;
overflow-x: auto;
padding: 0 16px;
gap: 4px;
border-bottom: 1px solid rgba(255,255,255,0.07);
background: var(–dark2);
scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
padding: 14px 20px;
font-size: 0.8rem;
letter-spacing: 0.15em;
text-transform: uppercase;
font-weight: 600;
color: var(–muted);
border: none;
background: none;
cursor: pointer;
white-space: nowrap;
border-bottom: 2px solid transparent;
transition: all 0.2s;
}

.tab:hover { color: var(–text); }

.tab.active {
color: var(–gold);
border-bottom-color: var(–gold);
}

/* Sections */
.section {
display: none;
padding: 20px 16px;
max-width: 860px;
margin: 0 auto;
}
.section.active { display: block; }

/* Groups grid */
.groups-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 14px;
}

.group-card {
background: var(–dark3);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 10px;
overflow: hidden;
animation: fadeUp 0.4s ease forwards;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

.group-header {
display: flex;
align-items: center;
gap: 10px;
padding: 12px 16px;
background: linear-gradient(90deg, rgba(26,111,216,0.15), transparent);
border-bottom: 1px solid rgba(255,255,255,0.07);
}

.group-letter {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.6rem;
color: var(–gold);
line-height: 1;
}

.group-title {
font-size: 0.7rem;
letter-spacing: 0.2em;
color: var(–muted);
text-transform: uppercase;
}

.team-row {
display: flex;
align-items: center;
gap: 10px;
padding: 9px 16px;
border-bottom: 1px solid rgba(255,255,255,0.04);
transition: background 0.15s;
}

.team-row:last-child { border-bottom: none; }
.team-row:hover { background: rgba(255,255,255,0.03); }

.team-flag { font-size: 1.2rem; flex-shrink: 0; }

.team-name {
flex: 1;
font-size: 0.9rem;
font-weight: 400;
}

.host-badge {
font-size: 0.6rem;
padding: 2px 6px;
background: rgba(201,168,76,0.15);
color: var(–gold);
border: 1px solid rgba(201,168,76,0.3);
border-radius: 10px;
letter-spacing: 0.1em;
}

/* Schedule */
.schedule-day {
margin-bottom: 24px;
}

.day-header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 10px;
}

.day-label {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.1rem;
color: var(–gold);
letter-spacing: 0.1em;
}

.day-line {
flex: 1;
height: 1px;
background: rgba(255,255,255,0.08);
}

.match-card {
background: var(–dark3);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 8px;
padding: 12px 16px;
margin-bottom: 8px;
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
gap: 10px;
transition: border-color 0.2s, background 0.2s;
cursor: default;
}

.match-card:hover {
border-color: rgba(201,168,76,0.2);
background: rgba(13,20,32,0.9);
}

.match-team {
display: flex;
align-items: center;
gap: 8px;
font-size: 0.95rem;
font-weight: 600;
}

.match-team.right {
flex-direction: row-reverse;
text-align: right;
}

.match-flag { font-size: 1.3rem; }

.match-center {
text-align: center;
min-width: 90px;
}

.match-score {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.6rem;
color: var(–gold-light);
line-height: 1;
}

.match-time {
font-size: 0.72rem;
color: var(–muted);
margin-top: 2px;
}

.match-venue {
font-size: 0.65rem;
color: var(–muted);
margin-top: 4px;
letter-spacing: 0.05em;
}

.match-group-tag {
font-size: 0.6rem;
color: var(–accent2);
letter-spacing: 0.15em;
text-transform: uppercase;
}

.live-badge {
display: inline-flex;
align-items: center;
gap: 4px;
background: rgba(224,48,48,0.15);
border: 1px solid rgba(224,48,48,0.4);
color: var(–red);
font-size: 0.65rem;
letter-spacing: 0.1em;
padding: 2px 7px;
border-radius: 10px;
font-weight: 700;
margin-bottom: 4px;
}

.live-dot {
width: 5px; height: 5px;
background: var(–red);
border-radius: 50%;
animation: pulse 1s ease-in-out infinite;
}

/* Knockout bracket */
.knockout-section { margin-bottom: 28px; }

.ko-round-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1rem;
letter-spacing: 0.2em;
color: var(–accent2);
text-transform: uppercase;
margin-bottom: 10px;
padding-bottom: 6px;
border-bottom: 1px solid rgba(0,207,255,0.15);
}

.ko-dates {
font-size: 0.75rem;
color: var(–muted);
margin-bottom: 12px;
}

.ko-info {
background: var(–dark3);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 8px;
padding: 14px 16px;
font-size: 0.85rem;
color: var(–muted);
line-height: 1.6;
}

/* Venues */
.venues-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
gap: 12px;
}

.venue-card {
background: var(–dark3);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 10px;
padding: 16px;
animation: fadeUp 0.3s ease forwards;
}

.venue-flag { font-size: 1.4rem; margin-bottom: 8px; }

.venue-city {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.1rem;
letter-spacing: 0.08em;
color: var(–gold);
}

.venue-stadium {
font-size: 0.8rem;
color: var(–text);
margin-top: 4px;
}

.venue-country {
font-size: 0.7rem;
color: var(–muted);
letter-spacing: 0.1em;
margin-top: 4px;
}

.venue-capacity {
font-size: 0.75rem;
color: var(–accent2);
margin-top: 8px;
}

/* Loading */
.loading {
text-align: center;
padding: 48px;
color: var(–muted);
}

.spinner {
width: 36px; height: 36px;
border: 3px solid rgba(201,168,76,0.2);
border-top-color: var(–gold);
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin: 0 auto 12px;
}

/* Responsive */
@media (max-width: 480px) {
.match-team-name { display: none; }
.match-card { grid-template-columns: auto auto auto; }
.groups-grid { grid-template-columns: 1fr; }
.venues-grid { grid-template-columns: 1fr; }
}

.section-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.4rem;
letter-spacing: 0.15em;
color: var(–gold);
margin-bottom: 16px;
text-transform: uppercase;
}

footer {
text-align: center;
padding: 24px;
color: var(–muted);
font-size: 0.72rem;
letter-spacing: 0.1em;
border-top: 1px solid rgba(255,255,255,0.05);
margin-top: 40px;
}
</style>

</head>

<div class="tabs">

<!-- GROUPS TAB -->

<div class="section active" id="tab-groups">

  </div>
</div>

<!-- SCHEDULE TAB -->

<div class="section" id="tab-schedule">

  <div id="scheduleContainer">
    <div class="loading"><div class="spinner"></div>載入中...</div>
  </div>
</div>

<!-- KNOCKOUT TAB -->

<div class="section" id="tab-knockout">
  <div class="section-title">⚡ 淘汰賽階段</div>
  <div id="knockoutContainer"></div>
</div>

<!-- VENUES TAB -->

<div class="section" id="tab-venues">
  <div class="section-title">🏟️ 16座比賽場地</div>
  <div class="venues-grid" id="venuesGrid"></div>
</div>

<footer>
  2026 FIFA World Cup™ · 資料來源：FIFA · 本頁每30秒自動更新
</footer>

</div>

// Tab switching
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// Countdown
function updateCountdown() {
  const opening = new Date('2026-06-11T19:00:00Z');
  const now = new Date();
  const diff = opening - now;

  if (diff <= 0) {
    document.getElementById('cdDays').textContent = '🎉';
    document.getElementById('cdHours').textContent = 'WC';
    document.getElementById('cdMins').textContent = '2026';
    document.getElementById('cdSecs').textContent = '🏆';
    return;
  }

  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);

  document.getElementById('cdDays').textContent = String(days).padStart(2, '0');
  document.getElementById('cdHours').textContent = String(hours).padStart(2, '0');
  document.getElementById('cdMins').textContent = String(mins).padStart(2, '0');
  document.getElementById('cdSecs').textContent = String(secs).padStart(2, '0');
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('localTime').textContent = '本地時間：' + now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// Render groups
function renderGroups() {
  const grid = document.getElementById('groupsGrid');
  grid.innerHTML = '';
  let delay = 0;
  for (const [letter, data] of Object.entries(GROUPS)) {
    const card = document.createElement('div');
    card.className = 'group-card';
    card.style.animationDelay = delay + 'ms';
    delay += 50;
    card.innerHTML = `
      <div class="group-header">
        <div class="group-letter">${letter}</div>
        <div class="group-title">小組 ${letter}</div>
      </div>
      ${data.teams.map(t => `
        <div class="team-row">
          <span class="team-flag">${t.flag}</span>
          <span class="team-name">${t.name}</span>
          ${t.host ? '<span class="host-badge">主辦國</span>' : ''}
        </div>
      `).join('')}
    `;
    grid.appendChild(card);
  }
}

// Render schedule
function renderSchedule() {
  const container = document.getElementById('scheduleContainer');
  container.innerHTML = SCHEDULE.map(day => `
    <div class="schedule-day">
      <div class="day-header">
        <div class="day-label">${day.date}</div>
        <div class="day-line"></div>
      </div>
      ${day.matches.map(m => `
        <div class="match-card">
          <div class="match-team">
            <span class="match-flag">${m.home.split(' ')[0]}</span>
            <span class="match-team-name">${m.home.split(' ').slice(1).join(' ')}</span>
          </div>
          <div class="match-center">
            <div class="match-group-tag">${m.group}</div>
            <div class="match-score">VS</div>
            <div class="match-time">${m.time}</div>
            <div class="match-venue">${m.venue}</div>
          </div>
          <div class="match-team right">
            <span class="match-flag">${m.away.split(' ')[0]}</span>
            <span class="match-team-name">${m.away.split(' ').slice(1).join(' ')}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  const moreNote = document.createElement('div');
  moreNote.style.cssText = 'text-align:center;padding:20px;color:var(--muted);font-size:0.8rem;';
  moreNote.textContent = '顯示開幕週賽程 (6月11-16日) · 完整104場賽程至7月19日決賽';
  container.appendChild(moreNote);
}
