<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>每日台股掃盤系統</title>
<style>
body{background:#0b1220;color:#e5e7eb;font-family:sans-serif;padding:20px}
button{padding:10px 18px;background:#22c55e;border:0;color:#fff;border-radius:8px}
.card{background:#111827;margin:8px 0;padding:10px;border-radius:8px;border-left:4px solid #3b82f6}
.good{border-left-color:#22c55e}
.small{font-size:12px;color:#94a3b8}
</style>
</head>
<body>

<h2>📊 每日台股掃盤</h2>

<button onclick="manualScan()">手動重新掃描</button>

<div id="status"></div>
<div id="list"></div>

<script>
let code = 1101;
let results = [];
const KEY = "daily_scan_data";
const TIME_KEY = "daily_scan_time";

/* ===== Stooq ===== */
async function getData(c){
    const url = `https://stooq.com/q/d/l/?s=${c}.tw&i=d`;
    const res = await fetch(url);
    const txt = await res.text();

    const rows = txt.split("\n").slice(1);
    return rows.map(r=>{
        const x = r.split(",");
        return +x[4];
    }).filter(x=>x);
}

/* ===== MACD簡化 ===== */
function ema(arr,n){
    let k=2/(n+1),out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k+out[i-1]*(1-k));
    }
    return out;
}

function macd(arr){
    const e12=ema(arr,12);
    const e26=ema(arr,26);
    const dif=e12.map((v,i)=>v-e26[i]);
    const dea=ema(dif,9);
    return dif.map((v,i)=>v-dea[i]);
}

/* ===== 評分 ===== */
function score(close){
    if(close.length<30) return 0;

    let s=0;
    const m=macd(close);

    if(m.at(-1)>0 && m.at(-2)<0) s+=40;

    const ma20=close.slice(-20).reduce((a,b)=>a+b)/20;
    if(close.at(-1)>ma20) s+=30;

    const high20=Math.max(...close.slice(-20));
    if(close.at(-1)>=high20) s+=30;

    return s;
}

/* ===== 顯示 ===== */
function show(code,s,price){
    const div=document.createElement("div");
    div.className="card "+(s>=80?"good":"");
    div.innerHTML=`
        <b>${code}</b>
        <div class="small">價格 ${price} ｜ 評分 ${s}</div>
    `;
    document.getElementById("list").prepend(div);
}

/* ===== 掃描20支（避免卡） ===== */
async function scanOnce(){
    results = [];
    for(let i=0;i<20;i++){
        const c = code++;
        document.getElementById("status").innerText = "掃描 " + c;

        try{
            const data = await getData(c);
            if(data.length < 30) continue;

            const s = score(data);
            const price = data.at(-1);

            if(s >= 60){
                results.push({code:c,score:s,price});
                show(c,s,price);
            }
        }catch(e){}

        await new Promise(r=>setTimeout(r,200));
    }

    saveData();
}

/* ===== 存資料 ===== */
function saveData(){
    localStorage.setItem(KEY, JSON.stringify(results));
    localStorage.setItem(TIME_KEY, new Date().toISOString());
    document.getElementById("status").innerText =
        "更新完成：" + new Date().toLocaleString();
}

/* ===== 載入資料 ===== */
function loadData(){
    const data = localStorage.getItem(KEY);
    const time = localStorage.getItem(TIME_KEY);

    if(time){
        document.getElementById("status").innerText =
            "上次更新：" + new Date(time).toLocaleString();
    }

    if(data){
        const arr = JSON.parse(data);
        arr.forEach(d=>show(d.code,d.score,d.price));
        return true;
    }
    return false;
}

/* ===== 判斷是否要更新 ===== */
function needUpdate(){
    const t = localStorage.getItem(TIME_KEY);
    if(!t) return true;

    const last = new Date(t);
    const now = new Date();

    return last.toDateString() !== now.toDateString();
}

/* ===== 主流程 ===== */
async function init(){
    if(loadData() && !needUpdate()){
        document.getElementById("status").innerText += "（已是今日最新）";
        return;
    }

    await scanOnce();
}

/* ===== 手動 ===== */
async function manualScan(){
    code = 1101;
    await scanOnce();
}

init();
</script>

</body>
</html>
