<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>50元以下起漲掃盤</title>

<style>
body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial;
    padding:20px;
}

button{
    padding:10px 20px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

#status{
    margin-top:10px;
    color:#94a3b8;
    font-size:14px;
}

.card{
    background:#1e293b;
    margin-top:8px;
    padding:10px;
    border-radius:8px;
    border-left:4px solid #334155;
}

.good{border-left-color:#22c55e;}
.mid{border-left-color:#fbbf24;}
.bad{border-left-color:#ef4444;}

.row{
    display:flex;
    justify-content:space-between;
}

.small{
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<h2>🚀 50元以下起漲掃盤</h2>
<button onclick="scan()">開始掃描</button>

<div id="status"></div>
<div id="list"></div>

<script>

// ================= 股票池（先用TWSE+TPEx） =================
async function getAllStocks(){

    let list = [];

    // 上市
    try{
        const r = await fetch("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL");
        const j = await r.json();

        j.forEach(s=>{
            if(s.Code) list.push(s.Code);
        });
    }catch(e){}

    // 上櫃
    try{
        const r = await fetch("https://www.tpex.org.tw/openapi/v1/mopsfin_t03sal2");
        const j = await r.json();

        j.forEach(s=>{
            if(s.SecuritiesCompanyCode)
                list.push(s.SecuritiesCompanyCode);
        });
    }catch(e){}

    return [...new Set(list)];
}

// ================= tools =================
const delay = ms => new Promise(r=>setTimeout(r,ms));

// ================= Yahoo =================
async function quote(id){

    try{
        const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW`);
        const j = await r.json();

        const m = j.chart.result[0].meta;

        const price = m.regularMarketPrice;
        const prev = m.previousClose;

        return {
            price,
            change: ((price-prev)/prev)*100
        };

    }catch{
        return null;
    }
}

async function history(id){

    try{
        const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?range=3mo&interval=1d`);
        const j = await r.json();

        return j.chart.result[0].indicators.quote[0].close.filter(Boolean);

    }catch{
        return null;
    }
}

// ================= MACD =================
function ema(arr,p){
    let k = 2/(p+1);
    let out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k + out[i-1]*(1-k));
    }
    return out;
}

function macd(arr){
    let e12=ema(arr,12);
    let e26=ema(arr,26);
    return e12.map((v,i)=>v-e26[i]);
}

// ================= 起漲評分 =================
function score(close, change){

    let m = macd(close);

    let last = m.at(-1);
    let prev = m.at(-2);

    let s = 0;

    // MACD翻紅
    if(last > 0 && prev < 0) s += 40;

    // 動能
    if(change > 2) s += 30;
    if(change > 0) s += 10;

    // 連續上漲
    let up = 0;
    for(let i=close.length-5;i<close.length;i++){
        if(close[i] > close[i-1]) up++;
    }
    if(up >= 3) s += 20;

    return s;
}

// ================= UI =================
function addCard(d){

    let div = document.createElement("div");

    div.className = "card " + (d.score>=70?"good":d.score>=50?"mid":"bad");

    div.innerHTML = `
        <div class="row">
            <b>${d.id}</b>
            <b>${d.price.toFixed(2)}</b>
        </div>
        <div class="small">
            漲跌 ${d.change.toFixed(2)}% ｜ 分數 ${d.score}
        </div>
    `;

    document.getElementById("list").prepend(div);
}

// ================= MAIN =================
async function scan(){

    const status = document.getElementById("status");
    const listBox = document.getElementById("list");

    listBox.innerHTML = "";

    status.innerText = "載入股票池...";

    let all = await getAllStocks();

    status.innerText = `總股票 ${all.length}，開始過濾 50元以下...`;

    let low50 = [];

    // ===== 第一步：先篩 50元以下 =====
    for(let i=0;i<all.length;i++){

        let id = all[i];

        let q = await quote(id);

        if(!q) continue;

        if(q.price <= 50){
            low50.push({id, price:q.price, change:q.change});
        }

        status.innerText = `篩選中 ${i}/${all.length} ｜ 50以下 ${low50.length}`;

        await delay(30);
    }

    status.innerText = `進入掃盤：50元以下 ${low50.length} 檔`;

    // ===== 第二步：掃起漲 =====
    for(let i=0;i<low50.length;i++){

        let s = low50[i];

        let h = await history(s.id);

        if(!h || h.length < 40) continue;

        let sc = score(h, s.change);

        if(sc >= 60){
            addCard({
                id:s.id,
                price:s.price,
                change:s.change,
                score:sc
            });
        }

        status.innerText = `掃盤中 ${i}/${low50.length} ｜ ${s.id}`;

        await delay(80);
    }

    status.innerText = "完成（50元以下起漲股已輸出）";
}

</script>

</body>
</html>
