<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>台股隔日推薦掃盤</title>
<style>
body{background:#0b1220;color:#e5e7eb;font-family:sans-serif;padding:20px}
button{padding:10px 18px;background:#22c55e;border:0;color:#fff;font-weight:700;border-radius:8px}
.card{background:#111827;margin:10px 0;padding:12px;border-radius:8px;border-left:4px solid #3b82f6}
.good{border-left-color:#22c55e}
.mid{border-left-color:#fbbf24}
.small{font-size:12px;color:#94a3b8}
</style>
</head>
<body>

<h2>📊 台股「隔日推薦掃盤」</h2>
<button onclick="start()">開始掃描</button>

<div id="status"></div>
<div id="list"></div>

<script>
let current = 1101;
let running = false;

/* ===== Stooq ===== */
async function getData(code){
    const url = `https://stooq.com/q/d/l/?s=${code}.tw&i=d`;
    const res = await fetch(url);
    const txt = await res.text();

    const rows = txt.split("\n").slice(1);
    return rows.map(r=>{
        const [d,o,h,l,c] = r.split(",");
        return {c:+c};
    }).filter(x=>x.c);
}

/* ===== EMA ===== */
function ema(arr,n){
    let k=2/(n+1),out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k+out[i-1]*(1-k));
    }
    return out;
}

/* ===== MACD ===== */
function macd(arr){
    const e12=ema(arr,12);
    const e26=ema(arr,26);
    const dif=e12.map((v,i)=>v-e26[i]);
    const dea=ema(dif,9);
    return dif.map((v,i)=>v-dea[i]);
}

/* ===== 評分 ===== */
function score(data){
    const close=data.map(x=>x.c);
    if(close.length<30) return 0;

    let s=0;
    const m=macd(close);

    if(m.at(-1)>0 && m.at(-2)<0) s+=40;

    const ma20=close.slice(-20).reduce((a,b)=>a+b)/20;
    if(close.at(-1)>ma20) s+=30;

    const high20=Math.max(...close.slice(-20));
    if(close.at(-1)>=high20) s+=30;

    return s;
}

/* ===== 顯示 ===== */
function add(code,score,price){
    const div=document.createElement("div");
    div.className="card "+(score>=80?"good":"mid");
    div.innerHTML=`
        <b>${code}</b>
        <div class="small">價格 ${price} ｜ 評分 ${score}</div>
    `;
    document.getElementById("list").appendChild(div);
}

/* ===== 主掃描 ===== */
async function start(){
    if(running) return;
    running=true;

    for(let i=0;i<20;i++){
        const code=current++;
        document.getElementById("status").innerText=`掃描 ${code}`;

        try{
            const data=await getData(code);
            if(data.length<30) continue;

            const s=score(data);
            const price=data.at(-1).c;

            if(s>=60){
                add(code,s,price);
            }

        }catch(e){}

        await new Promise(r=>setTimeout(r,500));
    }

    running=false;
    document.getElementById("status").innerText="本輪完成（可再按一次繼續）";
}
</script>

</body>
</html>
