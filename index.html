<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>穩定直播播放器</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#0f172a; color:white; font-family:Arial; }

.input-box {
  display:flex;
  padding:10px;
  background:#111827;
}
input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}
button {
  margin-left:10px;
  padding:10px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
}

.video-box {
  width:100%;
  height:220px;
  background:black;
}

.history {
  display:flex;
  overflow-x:auto;
  background:#1f2937;
  padding:8px;
}
.h-btn {
  margin-right:8px;
  padding:8px 12px;
  background:#374151;
  border:none;
  border-radius:6px;
  color:white;
}

.parse-box {
  padding:10px;
  background:#020617;
}

.result-item {
  background:#111827;
  margin-top:10px;
  padding:10px;
  border-radius:6px;
  font-size:12px;
  word-break:break-all;
}

.copy-btn {
  margin-top:6px;
  padding:4px 8px;
  background:#10b981;
  border:none;
  border-radius:4px;
  color:white;
}

.score-box {
  padding:10px;
  font-size:13px;
}
</style>
</head>

<body>

<!-- 🎥 播放 -->
<div class="input-box">
  <input id="url" placeholder="貼 m3u8 或播放頁">
  <button onclick="playInput()">播放</button>
</div>

<div class="history" id="history"></div>

<div class="video-box" id="playerBox"></div>

<!-- 📊 ESPN 比分 -->
<div class="score-box" id="scores">載入比分...</div>

<script>
let hls;
const HISTORY_KEY = "stream_history";

/* =========================
   🎥 播放核心（穩定版）
========================= */
function playInput() {
  const url = document.getElementById("url").value.trim();
  if (!url) return;
  play(url);
  document.getElementById("url").value = "";
}

function play(url) {
  saveHistory(url);
  renderHistory();

  const box = document.getElementById("playerBox");

  if (!url.includes(".m3u8")) {
    box.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;" frameborder="0"></iframe>`;
    return;
  }

  box.innerHTML = `<video id="video" controls autoplay muted playsinline style="width:100%;height:100%"></video>`;
  const video = document.getElementById("video");

  if (hls) hls.destroy();

  hls = new Hls({
    enableWorker: true,
    lowLatencyMode: false,

    // 👉 穩定優先（不要太激進）
    maxBufferLength: 30,
    backBufferLength: 30
  });

  hls.loadSource(url);
  hls.attachMedia(video);

  /* =========================
     🔥 唯一重要：斷流重載
  ========================= */
  hls.on(Hls.Events.ERROR, (event, data) => {
    if (data.fatal) {
      console.log("流中斷 → 重載");
      hls.startLoad();
    }
  });
}

/* =========================
   🕘 歷史（5個）
========================= */
function getHistory() {
  return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
}

function saveHistory(url) {
  let list = getHistory().filter(u => u !== url);
  list.unshift(url);
  if (list.length > 5) list = list.slice(0,5);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
}

function renderHistory() {
  const box = document.getElementById("history");
  box.innerHTML = "";

  getHistory().forEach((url, i) => {
    const btn = document.createElement("button");
    btn.className = "h-btn";
    btn.innerText = i + 1;
    btn.onclick = () => play(url);
    box.appendChild(btn);
  });
}

/* =========================
   📊 ESPN 多聯盟比分
========================= */
const sports = [
  { name:"NBA", url:"basketball/nba" },
  { name:"NFL", url:"football/nfl" },
  { name:"MLB", url:"baseball/mlb" },
  { name:"足球", url:"soccer/eng.1" }
];

async function loadScores() {
  let html = "";

  for (let s of sports) {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${s.url}/scoreboard`);
      const data = await res.json();

      html += `<div style="margin-top:8px;font-weight:bold;">${s.name}</div>`;

      data.events.forEach(g => {
        const c = g.competitions[0];
        const home = c.competitors.find(t => t.homeAway === "home");
        const away = c.competitors.find(t => t.homeAway === "away");

        html += `
          ${away.team.displayName} ${away.score}<br>
          ${home.team.displayName} ${home.score}<br><br>
        `;
      });

    } catch (e) {}
  }

  document.getElementById("scores").innerHTML = html || "無比賽";
}

renderHistory();
loadScores();
setInterval(loadScores, 10000);
</script>

</body>
</html>
