<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA 世界盃</title>

<style>
body{
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
}

.match-card{
  background:#141b2d;
  margin:10px;
  padding:10px;
  border-radius:8px;
}

.live{
  border:1px solid red;
}

.score{
  font-size:22px;
  font-weight:bold;
  color:#ffd700;
}

.live-badge{
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}
</style>
</head>

<body>

<h2>2026 世界盃 賽程 + 即時比分</h2>

<div id="container"></div>

<script>

/* =========================
   ① 你的原始賽程（不動）
========================= */

const SCHEDULE = [
{
  id:"A1",
  home:"Mexico",
  away:"South Africa",
  time:"03:00"
},
{
  id:"A2",
  home:"Korea Republic",
  away:"Czechia",
  time:"10:00"
},
{
  id:"B1",
  home:"Canada",
  away:"Bosnia",
  time:"03:00"
}
];

/* =========================
   ② API KEY（你要填）
========================= */

const API_KEY = "YOUR_API_KEY_HERE";

/* =========================
   ③ 比分快取
========================= */

let scoreMap = {};

/* =========================
   ④ 抓 API 真實比分
========================= */

async function fetchScores(){

  try{

    const res = await fetch(
      "https://v3.football.api-sports.io/fixtures?season=2026",
      {
        headers:{
          "x-apisports-key": API_KEY
        }
      }
    );

    const data = await res.json();

    const list = data.response || [];

    scoreMap = {};

    list.forEach(m=>{

      const home = m.teams.home.name;
      const away = m.teams.away.name;

      const key = home + "-" + away;

      scoreMap[key] = {
        homeScore: m.goals.home,
        awayScore: m.goals.away,
        status: m.fixture.status.short
      };
    });

    render();

  }catch(err){
    console.log("API error", err);
  }
}

/* =========================
   ⑤ 對應比分
========================= */

function getScore(m){

  const key = m.home + "-" + m.away;

  const d = scoreMap[key];

  if(!d) return "VS";

  return `${d.homeScore ?? 0} - ${d.awayScore ?? 0}`;
}

/* =========================
   ⑥ 判斷 LIVE
========================= */

function isLive(m){

  const key = m.home + "-" + m.away;

  const d = scoreMap[key];

  return d?.status === "LIVE" || d?.status === "1H" || d?.status === "2H";
}

/* =========================
   ⑦ render（不改賽程）
========================= */

function render(){

  const el = document.getElementById("container");

  el.innerHTML = SCHEDULE.map(m=>`

    <div class="match-card ${isLive(m)?'live':''}">

      ${isLive(m) ? '<div class="live-badge">● LIVE</div>' : ''}

      <div>${m.home} vs ${m.away}</div>

      <div class="score">
        ${getScore(m)}
      </div>

      <div style="opacity:0.7;font-size:12px">
        ${m.time}
      </div>

    </div>

  `).join('');

}

/* =========================
   ⑧ 自動更新
========================= */

fetchScores();

setInterval(fetchScores, 30000);

</script>

</body>
</html>
