<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股盤後行情 · 即時彙整</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0d0f;
    --bg-panel: #10151a;
    --bg-row-alt: #0d1216;
    --line: #1e2830;
    --text: #dfe6eb;
    --text-dim: #6b7d88;
    --up: #00d97e;
    --up-dim: #0a3d2a;
    --down: #ff4d4d;
    --down-dim: #401414;
    --amber: #ffb020;
    --flat: #8a99a3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC','IBM Plex Mono',monospace;
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  header{
    padding:28px 24px 18px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;
    background:rgba(10,13,15,0.92);
    backdrop-filter:blur(8px);
  }
  .titlebar{
    display:flex; align-items:baseline; justify-content:space-between;
    flex-wrap:wrap; gap:12px;
    max-width:1200px; margin:0 auto;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px; font-weight:700; letter-spacing:0.3px;
    margin:0; color:#fff;
  }
  h1 span{color:var(--amber); font-weight:500; font-size:14px; margin-left:10px; letter-spacing:1px;}
  .status{
    font-size:12px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace;
  }
  .status b{color:var(--text);}
  .controls{
    max-width:1200px; margin:16px auto 0;
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  input[type=text]{
    flex:1; min-width:180px;
    background:var(--bg-panel); border:1px solid var(--line); color:var(--text);
    padding:10px 14px; border-radius:6px; font-size:14px;
    font-family:'IBM Plex Mono',monospace;
    outline:none;
  }
  input[type=text]:focus{border-color:var(--amber);}
  button{
    background:var(--bg-panel); border:1px solid var(--line); color:var(--text);
    padding:10px 16px; border-radius:6px; font-size:13px; cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
    transition:border-color .15s;
  }
  button:hover{border-color:var(--amber); color:var(--amber);}
  button.primary{background:var(--amber); color:#1a1200; border-color:var(--amber); font-weight:600;}
  button.primary:hover{filter:brightness(1.08);}
  .pricefilter{
    display:flex; align-items:center; gap:6px;
    background:var(--bg-panel); border:1px solid var(--line); border-radius:6px;
    padding:9px 14px; font-size:13px; color:var(--text-dim); cursor:pointer;
    white-space:nowrap;
  }
  .pricefilter input[type=checkbox]{accent-color:var(--amber); width:14px; height:14px; cursor:pointer;}
  .capinput{
    width:48px; background:var(--bg); border:1px solid var(--line); color:var(--amber);
    padding:4px 6px; border-radius:4px; text-align:center; font-size:13px;
  }
  .capinput:focus{outline:none; border-color:var(--amber);}

  /* market pulse bar - signature element */
  .pulse-wrap{max-width:1200px; margin:16px auto 0;}
  .pulse-label{display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:5px;}
  .pulse-bar{height:8px; border-radius:4px; overflow:hidden; display:flex; background:var(--line);}
  .pulse-up{background:var(--up); transition:width .6s ease;}
  .pulse-down{background:var(--down); transition:width .6s ease;}
  .pulse-flat{background:var(--flat); transition:width .6s ease;}

  main{max-width:1200px; margin:0 auto; padding:20px 24px 60px;}
  .tablewrap{border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{
    text-align:right; padding:10px 14px; background:var(--bg-panel);
    color:var(--text-dim); font-weight:500; font-size:11px;
    letter-spacing:0.5px; cursor:pointer; user-select:none;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  thead th:first-child, thead th:nth-child(2){text-align:left;}
  thead th:hover{color:var(--amber);}
  thead th.active{color:var(--amber);}
  thead th .arrow{font-size:9px; margin-left:3px;}
  tbody td{
    padding:9px 14px; text-align:right; font-family:'IBM Plex Mono',monospace;
    border-bottom:1px solid var(--line); white-space:nowrap;
  }
  tbody td:first-child, tbody td:nth-child(2){text-align:left; font-family:'Noto Sans TC',sans-serif;}
  tbody tr:nth-child(even){background:var(--bg-row-alt);}
  tbody tr:hover{background:#152128;}
  .code{color:var(--text-dim);}
  .name{color:#fff; font-weight:500;}
  .up{color:var(--up);}
  .down{color:var(--down);}
  .flat{color:var(--flat);}
  .badge{
    display:inline-block; padding:1px 6px; border-radius:3px; font-size:11px;
  }
  .badge.up{background:var(--up-dim);}
  .badge.down{background:var(--down-dim);}
  .empty, .loading, .errbox{
    text-align:center; padding:60px 20px; color:var(--text-dim); font-size:14px;
  }
  .errbox{color:var(--down);}
  .errbox a{color:var(--amber);}
  .spinner{
    width:22px; height:22px; border:2px solid var(--line); border-top-color:var(--amber);
    border-radius:50%; margin:0 auto 14px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  footer{text-align:center; color:var(--text-dim); font-size:11px; padding:0 24px 40px;}
  ::selection{background:var(--amber); color:#000;}
  @media (max-width:640px){
    thead th, tbody td{padding:8px 8px; font-size:12px;}
    h1{font-size:18px;}
  }
</style>
</head>
<body>

<header>
  <div class="titlebar">
    <h1>台股盤後行情<span>TWSE · 全市場彙整</span></h1>
    <div class="status"><span id="status">連線中…</span> <span id="poolCount" class="mono" style="color:var(--amber);"></span></div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="搜尋股票代號或名稱，例如 2330 或 台積電">
    <label class="pricefilter">
      <input type="checkbox" id="priceFilterToggle" checked>
      收盤價 ≤ <input type="text" id="priceCap" class="capinput mono" value="40">元
    </label>
    <button class="primary" id="refreshBtn">重新抓取最新資料</button>
  </div>
  <div class="pulse-wrap">
    <div class="pulse-label"><span id="pulseUpLabel">上漲 —</span><span id="pulseDownLabel">下跌 —</span></div>
    <div class="pulse-bar"><div class="pulse-up" id="pulseUp" style="width:0%"></div><div class="pulse-flat" id="pulseFlat" style="width:0%"></div><div class="pulse-down" id="pulseDown" style="width:0%"></div></div>
  </div>
</header>

<main>
  <div class="tablewrap">
    <table id="table" style="display:none;">
      <thead>
        <tr>
          <th data-key="Code">代號</th>
          <th data-key="Name">名稱</th>
          <th data-key="ClosingPrice">收盤價</th>
          <th data-key="Change">漲跌</th>
          <th data-key="ChangePct">漲跌%</th>
          <th data-key="OpeningPrice">開盤</th>
          <th data-key="HighestPrice">最高</th>
          <th data-key="LowestPrice">最低</th>
          <th data-key="TradeVolume">成交量(股)</th>
          <th data-key="Transaction">筆數</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="loading" id="loading"><div class="spinner"></div>正在向證交所 OpenAPI 抓取全市場資料…</div>
  </div>
</main>

<footer>資料來源：台灣證券交易所 OpenAPI (openapi.twse.com.tw)，為最近一個交易日之盤後資料，非即時報價。</footer>

<script>
const API = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL';
let rawData = [];
let sortKey = 'TradeVolume';
let sortDir = -1;

function fmtNum(n){
  const v = Number(n);
  if(isNaN(v)) return '—';
  return v.toLocaleString('en-US');
}
function fmtPrice(n){
  const v = Number(n);
  if(isNaN(v) || v===0) return '—';
  return v.toFixed(2);
}

function render(list){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  if(list.length===0){
    tbody.innerHTML = '<tr><td colspan="10" class="empty">找不到符合的股票</td></tr>';
    return;
  }
  const frag = document.createDocumentFragment();
  list.forEach(d=>{
    const chg = Number(d.Change);
    const cls = chg>0?'up':(chg<0?'down':'flat');
    const sign = chg>0?'+':'';
    const pct = d._pct;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="code">${d.Code}</td>
      <td class="name">${d.Name}</td>
      <td class="${cls}">${fmtPrice(d.ClosingPrice)}</td>
      <td class="${cls}"><span class="badge ${cls}">${sign}${fmtPrice(Math.abs(chg))}</span></td>
      <td class="${cls}">${sign}${pct.toFixed(2)}%</td>
      <td>${fmtPrice(d.OpeningPrice)}</td>
      <td>${fmtPrice(d.HighestPrice)}</td>
      <td>${fmtPrice(d.LowestPrice)}</td>
      <td>${fmtNum(d.TradeVolume)}</td>
      <td>${fmtNum(d.Transaction)}</td>
    `;
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);
}

function applySort(list){
  return [...list].sort((a,b)=>{
    let av = a[sortKey], bv = b[sortKey];
    if(sortKey==='Code' || sortKey==='Name'){
      return sortDir * String(av).localeCompare(String(bv), 'zh-Hant');
    }
    av = Number(av)||0; bv = Number(bv)||0;
    return sortDir * (av - bv);
  });
}

function applyFilter(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const priceOn = document.getElementById('priceFilterToggle').checked;
  const cap = Number(document.getElementById('priceCap').value) || Infinity;
  let list = rawData;
  if(q){
    list = list.filter(d => d.Code.toLowerCase().includes(q) || d.Name.toLowerCase().includes(q));
  }
  if(priceOn){
    list = list.filter(d => Number(d.ClosingPrice) > 0 && Number(d.ClosingPrice) <= cap);
  }
  const countLabel = document.getElementById('poolCount');
  if(countLabel) countLabel.textContent = `· 篩選後 ${list.length} 檔`;
  render(applySort(list));
  updatePulse();
}

function currentPool(){
  const priceOn = document.getElementById('priceFilterToggle').checked;
  const cap = Number(document.getElementById('priceCap').value) || Infinity;
  return priceOn ? rawData.filter(d => Number(d.ClosingPrice) > 0 && Number(d.ClosingPrice) <= cap) : rawData;
}

function updatePulse(){
  const pool = currentPool();
  const up = pool.filter(d=>Number(d.Change)>0).length;
  const down = pool.filter(d=>Number(d.Change)<0).length;
  const flat = pool.length - up - down;
  const total = pool.length || 1;
  document.getElementById('pulseUp').style.width = (up/total*100)+'%';
  document.getElementById('pulseFlat').style.width = (flat/total*100)+'%';
  document.getElementById('pulseDown').style.width = (down/total*100)+'%';
  document.getElementById('pulseUpLabel').textContent = `上漲 ${up}`;
  document.getElementById('pulseDownLabel').textContent = `下跌 ${down}`;
}

function updateSortHeaders(){
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.toggle('active', th.dataset.key===sortKey);
    th.querySelector('.arrow')?.remove();
    if(th.dataset.key===sortKey){
      const a = document.createElement('span');
      a.className='arrow';
      a.textContent = sortDir===1?'▲':'▼';
      th.appendChild(a);
    }
  });
}

async function loadData(){
  const loading = document.getElementById('loading');
  const table = document.getElementById('table');
  const status = document.getElementById('status');
  loading.style.display='block';
  loading.innerHTML = '<div class="spinner"></div>正在向證交所 OpenAPI 抓取全市場資料…';
  table.style.display='none';
  status.textContent = '連線中…';
  try{
    const res = await fetch(API, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    rawData = json.filter(d => d.Code && d.ClosingPrice).map(d=>{
      const close = Number(d.ClosingPrice)||0;
      const chg = Number(d.Change)||0;
      const base = close - chg;
      d._pct = base!==0 ? (chg/base*100) : 0;
      return d;
    });
    sortKey='TradeVolume'; sortDir=-1;
    updateSortHeaders();
    applyFilter();
    updatePulse();
    loading.style.display='none';
    table.style.display='table';
    const now = new Date();
    status.innerHTML = `共 <b>${rawData.length}</b> 檔　更新於 <b>${now.toLocaleTimeString('zh-TW')}</b>`;
  }catch(err){
    loading.innerHTML = `<div class="errbox">抓取失敗：${err.message}<br><br>
      可能原因：瀏覽器封鎖跨網域請求，或證交所 API 暫時無回應。<br>
      可直接開啟 <a href="${API}" target="_blank">${API}</a> 確認資料是否可存取，或稍後按「重新抓取」再試一次。</div>`;
    status.textContent = '抓取失敗';
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadData);
document.getElementById('search').addEventListener('input', applyFilter);
document.getElementById('priceFilterToggle').addEventListener('change', applyFilter);
document.getElementById('priceCap').addEventListener('input', applyFilter);
document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.dataset.key;
    if(sortKey===key){ sortDir *= -1; } else { sortKey = key; sortDir = -1; }
    updateSortHeaders();
    applyFilter();
  });
});

loadData();
</script>
</body>
</html>
