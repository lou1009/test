<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>全台股 AI 掃盤（全市場版）</title>

<style>
body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial;
    padding:20px;
}

button{
    padding:10px 20px;
    background:#22c55e;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:6px;
}

#status{
    margin-top:10px;
    color:#94a3b8;
    font-size:14px;
}

.card{
    background:#1e293b;
    margin-top:8px;
    padding:10px;
    border-radius:8px;
    border-left:4px solid #334155;
}

.good{border-left-color:#22c55e;}
.bad{border-left-color:#ef4444;}

.row{
    display:flex;
    justify-content:space-between;
}

.small{
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<h2>📊 全市場 AI 掃盤（1800檔）</h2>
<button onclick="scan()">開始掃描</button>

<div id="status"></div>
<div id="list"></div>

<script>

// ================= 台股生成（2330~9999粗略市場） =================
// 👉 實務上：先用數字池 + 逐步過濾（避免API炸）
function generateStocks(){
    let arr = [];

    // 台股常見區段
    for(let i=1100;i<=9950;i++){
        let s = i.toString();

        // 排除太怪的
        if(s.endsWith("0") || s.endsWith("5")){
            arr.push(s);
        }
    }

    // 加權核心股
    const core = [
        "2330","2317","2454","2382","2308",
        "2881","2882","2886","2891","2884",
        "2303","2379","2357","2395","1216",
        "1301","1303","1326","2002","2412",
        "2603","2609","2610","2615","2618"
    ];

    return [...core, ...arr.slice(0,1500)];
}

// ================= tools =================
const delay = ms => new Promise(r=>setTimeout(r,ms));

function score(change, macd){
    let s = 0;
    if(macd > 0) s += 40;
    if(change > 2) s += 30;
    if(change > 0) s += 20;
    return s;
}

// ================= Yahoo =================
async function getQuote(id){

    try{
        const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW`);
        const j = await r.json();

        const m = j.chart.result[0].meta;

        const price = m.regularMarketPrice;
        const prev = m.previousClose;

        return {
            price,
            change: ((price-prev)/prev)*100
        };

    }catch{
        return null;
    }
}

async function getHistory(id){

    try{
        const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?range=3mo&interval=1d`);
        const j = await r.json();

        return j.chart.result[0].indicators.quote[0].close.filter(Boolean);

    }catch{
        return null;
    }
}

// ================= MACD =================
function ema(arr,p){
    let k = 2/(p+1);
    let out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k + out[i-1]*(1-k));
    }
    return out;
}

function macd(arr){
    let e12 = ema(arr,12);
    let e26 = ema(arr,26);
    return e12.map((v,i)=>v-e26[i]).at(-1);
}

// ================= UI =================
function addCard(d){

    let div = document.createElement("div");
    div.className = "card " + (d.score>=60 ? "good":"bad");

    div.innerHTML = `
        <div class="row">
            <b>${d.id}</b>
            <b>${d.price.toFixed(2)}</b>
        </div>
        <div class="small">
            漲跌：${d.change.toFixed(2)}% ｜ MACD：${d.macd.toFixed(2)} ｜ 分數：${d.score}
        </div>
    `;

    document.getElementById("list").prepend(div);
}

// ================= WORKER（關鍵） =================
async function worker(pool, stocks, status){

    while(stocks.length){

        const id = stocks.pop();

        status.innerText = `掃描中｜剩餘 ${stocks.length} ｜ ${id}`;

        const q = await Promise.race([
            getQuote(id),
            delay(1500).then(()=>null)
        ]);

        if(!q) continue;

        const h = await Promise.race([
            getHistory(id),
            delay(1500).then(()=>null)
        ]);

        if(!h || h.length < 30) continue;

        const m = macd(h);

        const s = score(q.change, m);

        if(s >= 60){
            addCard({
                id,
                ...q,
                macd:m,
                score:s
            });
        }

        await delay(80); // 控制 API 壓力
    }
}

// ================= MAIN =================
async function scan(){

    const status = document.getElementById("status");
    const list = document.getElementById("list");

    list.innerHTML = "";

    let stocks = generateStocks();

    status.innerText = "初始化股票池..." + stocks.length;

    // 👉 4條並行掃描（重點）
    await Promise.all([
        worker(1, stocks, status),
        worker(2, stocks, status),
        worker(3, stocks, status),
        worker(4, stocks, status)
    ]);

    status.innerText = "掃描完成";
}

</script>

</body>
</html>
