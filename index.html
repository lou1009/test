<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>World Cup 2026 即時比分</title>

<style>
:root {
  --dark: #0f172a;
  --card: #1e293b;
  --accent: #22c55e;
  --text: #e2e8f0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Barlow Condensed', 'Noto Sans TC', sans-serif;
  padding: 20px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 20px;
  background: var(--card);
  cursor: pointer;
  border-radius: 8px;
}

.tab.active {
  background: var(--accent);
  color: black;
}

.section { display: none; }
.section.active { display: block; }

.match {
  background: var(--card);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.teams {
  font-size: 18px;
  margin-bottom: 5px;
}

.score {
  font-size: 28px;
  font-weight: bold;
}

.status {
  font-size: 14px;
  margin-top: 5px;
}

.status.live {
  color: red;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
</style>
</head>

<body>

<h1>⚽ 世界盃 2026 即時比分</h1>

<div class="tabs">
  <div class="tab active" onclick="showTab(event,'live')">即時比分</div>
  <div class="tab" onclick="showTab(event,'schedule')">賽程</div>
</div>

<!-- 即時比分 -->
<div id="tab-live" class="section active">
  <div id="liveMatches">載入中...</div>
</div>

<!-- 假賽程（你原本的） -->
<div id="tab-schedule" class="section">
  <div class="match">
    <div class="teams">🇲🇽 墨西哥 vs 🇿🇦 南非</div>
    <div class="status">06/11 03:00</div>
  </div>
</div>

<script>
// 🔁 分頁切換
function showTab(e, name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById('tab-' + name).classList.add('active');
  e.target.classList.add('active');
}

// 🌐 API
const API_URL = 'https://www.thesportsdb.com/api/v1/json/3/eventsday.php?s=Soccer';

// 📡 抓即時比分
async function fetchLiveScores() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data.events) {
      document.getElementById('liveMatches').innerHTML = '今天沒有比賽';
      return;
    }

    const matches = data.events.map(e => ({
      home: e.strHomeTeam,
      away: e.strAwayTeam,
      homeScore: e.intHomeScore ?? '-',
      awayScore: e.intAwayScore ?? '-',
      status: e.strStatus || 'NS'
    }));

    renderMatches(matches);

  } catch (err) {
    document.getElementById('liveMatches').innerHTML = '載入失敗';
    console.error(err);
  }
}

// 🎨 渲染
function renderMatches(matches) {
  const el = document.getElementById('liveMatches');

  el.innerHTML = matches.map(m => `
    <div class="match">
      <div class="teams">${m.home} vs ${m.away}</div>
      <div class="score">${m.homeScore} - ${m.awayScore}</div>
      <div class="status ${m.status === 'Live' ? 'live' : ''}">
        ${m.status}
      </div>
    </div>
  `).join('');
}

// ⏱️ 自動更新
fetchLiveScores();
setInterval(fetchLiveScores, 10000);

</script>

</body>
</html>
