<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>全市場掃盤系統</title>
<style>
body{background:#0b1220;color:#e5e7eb;font-family:sans-serif;padding:20px}
button{padding:10px 18px;background:#22c55e;border:0;color:#fff;border-radius:8px}
.card{background:#111827;margin:8px 0;padding:10px;border-radius:8px;border-left:4px solid #3b82f6}
.good{border-left-color:#22c55e}
.mid{border-left-color:#fbbf24}
.small{font-size:12px;color:#94a3b8}
</style>
</head>
<body>

<h2>📊 全市場掃盤（連續版）</h2>
<button onclick="start()">開始</button>
<button onclick="stop()">停止</button>

<div id="status"></div>
<div id="list"></div>

<script>
let code = 1101;
let running = false;

/* ===== 抓K線 ===== */
async function getData(c){
    const url = `https://stooq.com/q/d/l/?s=${c}.tw&i=d`;
    const res = await fetch(url);
    const txt = await res.text();

    const rows = txt.split("\n").slice(1);
    return rows.map(r=>{
        const [d,o,h,l,close] = r.split(",");
        return +close;
    }).filter(x=>x);
}

/* ===== EMA ===== */
function ema(arr,n){
    let k=2/(n+1),out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k+out[i-1]*(1-k));
    }
    return out;
}

/* ===== MACD ===== */
function macd(arr){
    const e12=ema(arr,12);
    const e26=ema(arr,26);
    const dif=e12.map((v,i)=>v-e26[i]);
    const dea=ema(dif,9);
    return dif.map((v,i)=>v-dea[i]);
}

/* ===== 評分 ===== */
function score(close){
    if(close.length<30) return 0;

    let s=0;
    const m=macd(close);

    if(m.at(-1)>0 && m.at(-2)<0) s+=40;

    const ma20=close.slice(-20).reduce((a,b)=>a+b)/20;
    if(close.at(-1)>ma20) s+=30;

    const high20=Math.max(...close.slice(-20));
    if(close.at(-1)>=high20) s+=30;

    return s;
}

/* ===== 顯示 ===== */
function show(c,s,price){
    const div=document.createElement("div");
    div.className="card "+(s>=80?"good":"mid");
    div.innerHTML=`
        <b>${c}</b>
        <div class="small">價格 ${price} ｜ 評分 ${s}</div>
    `;
    document.getElementById("list").prepend(div);
}

/* ===== 主循環 ===== */
async function loop(){
    while(running){

        document.getElementById("status").innerText=`掃描中：${code}`;

        try{
            const data=await getData(code);

            if(data.length>30){
                const s=score(data);

                if(s>=60){
                    show(code,s,data.at(-1));
                }
            }
        }catch(e){}

        code++;

        if(code>9999) code=1101;

        await new Promise(r=>setTimeout(r,300)); // 控速關鍵
    }
}

function start(){
    if(running) return;
    running=true;
    loop();
}

function stop(){
    running=false;
}
</script>

</body>
</html>
