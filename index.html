<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>直播 + ESPN 即時比分</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
}

/* 🎥 播放器 */
.video-container {
  position: relative;
  width: 100%;
  height: 220px;
  background: black;
}

video {
  width: 100%;
  height: 100%;
}

/* LIVE */
.live-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  display: flex;
  align-items: center;
}

.live-dot {
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  margin-right: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity:0;}
}

/* 點擊提示 */
.tap-hint {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
}

/* 📊 比分 */
.score-board {
  padding: 10px;
}

.game {
  border-bottom: 1px solid #1e293b;
  padding: 10px 0;
}

.team {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.score {
  font-weight: bold;
  font-size: 18px;
}

.live-score {
  color: #ff3b3b;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  50% {opacity:0.5;}
}

.status {
  text-align: center;
  font-size: 12px;
  color: #94a3b8;
}

/* 🔥 全螢幕 */
video:-webkit-full-screen {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<!-- 🎥 直播 -->
<div class="video-container" id="playerBox">
  <div class="live-badge">
    <div class="live-dot"></div> LIVE
  </div>

  <video 
    id="video"
    controls
    autoplay
    muted
    playsinline
    webkit-playsinline
  ></video>

  <div class="tap-hint">點擊進入全螢幕</div>
</div>

<!-- 📊 ESPN 比分 -->
<div class="score-board" id="scoreBoard"></div>

<script>
// 🎥 m3u8
const videoSrc = "https://play1nm.hnyongshun.cn/live/bdf3e5442ed29fc2e9c9cc05b4947dc2.m3u8";
const video = document.getElementById("video");
const playerBox = document.getElementById("playerBox");

// HLS
if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} else {
  video.src = videoSrc;
}

// 🔥 點擊 → 全螢幕（iPhone 必備）
playerBox.addEventListener("click", () => {
  if (video.webkitEnterFullscreen) {
    video.webkitEnterFullscreen();
  } else if (playerBox.requestFullscreen) {
    playerBox.requestFullscreen();
  }
});

// 📊 ESPN 即時比分
async function loadScore() {
  try {
    const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard");
    const data = await res.json();

    let html = "";

    data.events.forEach(game => {

      const comp = game.competitions[0];
      const home = comp.competitors.find(t => t.homeAway === "home");
      const away = comp.competitors.find(t => t.homeAway === "away");

      const isLive = game.status.type.state === "in";

      html += `
        <div class="game">
          <div class="team">
            <div>${away.team.displayName}</div>
            <div class="score ${isLive ? "live-score" : ""}">
              ${away.score}
            </div>
          </div>

          <div class="team">
            <div>${home.team.displayName}</div>
            <div class="score ${isLive ? "live-score" : ""}">
              ${home.score}
            </div>
          </div>

          <div class="status">
            ${game.status.type.shortDetail}
          </div>
        </div>
      `;
    });

    document.getElementById("scoreBoard").innerHTML = html;

  } catch (e) {
    document.getElementById("scoreBoard").innerHTML = "ESPN 讀取失敗";
  }
}

// 🔄 每10秒更新
loadScore();
setInterval(loadScore, 10000);

</script>

</body>
</html>
