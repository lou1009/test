<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>全台股 AI 掃盤（MACD評分版）</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
}
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}
td, th {
    padding: 8px;
    border-bottom: 1px solid #334155;
    text-align: center;
}
.good { color: #22c55e; }
.bad { color: #ef4444; }
</style>
</head>
<body>

<h2>📈 AI 全台股掃描（MACD評分版）</h2>
<button onclick="scan()">開始掃描</button>

<table id="result">
<thead>
<tr>
<th>代號</th>
<th>價格</th>
<th>漲幅%</th>
<th>成交量</th>
<th>MACD</th>
<th>分數</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// 🔹 取得台股清單（簡化版）
async function getStockList() {
    let res = await fetch("https://api.finmindtrade.com/api/v4/data", {
        method: "POST",
        body: JSON.stringify({
            dataset: "TaiwanStockInfo"
        }),
        headers: { "Content-Type": "application/json" }
    });
    let data = await res.json();
    return data.data.map(s => s.stock_id);
}

// 🔹 取得即時報價（Yahoo）
async function getQuote(id) {
    try {
        let res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW`);
        let json = await res.json();

        let price = json.chart.result[0].meta.regularMarketPrice;
        let prev = json.chart.result[0].meta.previousClose;
        let volume = json.chart.result[0].meta.regularMarketVolume;

        let change = ((price - prev) / prev * 100).toFixed(2);

        return { price, change, volume };
    } catch {
        return null;
    }
}

// 🔹 取得歷史資料（算MACD）
async function getHistory(id) {
    try {
        let res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?range=1mo&interval=1d`);
        let json = await res.json();
        return json.chart.result[0].indicators.quote[0].close;
    } catch {
        return null;
    }
}

// 🔹 計算 EMA
function ema(data, period) {
    let k = 2 / (period + 1);
    let emaArr = [data[0]];
    for (let i = 1; i < data.length; i++) {
        emaArr.push(data[i] * k + emaArr[i - 1] * (1 - k));
    }
    return emaArr;
}

// 🔹 MACD
function calcMACD(data) {
    let ema12 = ema(data, 12);
    let ema26 = ema(data, 26);
    let macd = ema12.map((v, i) => v - ema26[i]);
    return macd[macd.length - 1];
}

// 🔹 評分系統
function scoreStock({ change, volume, macd }) {
    let score = 0;

    if (macd > 0) score += 40;
    if (change > 0) score += 30;
    if (volume > 1000) score += 30;

    return score;
}

// 🔥 主掃描
async function scan() {

    let table = document.querySelector("#result tbody");
    table.innerHTML = "<tr><td colspan='6'>掃描中...</td></tr>";

    let list = await getStockList();

    let results = [];

    // 👉 控制掃描數量（避免API炸掉）
    let sample = list.slice(0, 200);

    for (let id of sample) {

        let quote = await getQuote(id);
        if (!quote) continue;

        // 👉 條件：30元以下
        if (quote.price > 30) continue;

        let history = await getHistory(id);
        if (!history) continue;

        let macd = calcMACD(history);

        let score = scoreStock({
            change: quote.change,
            volume: quote.volume,
            macd
        });

        if (score >= 60) {
            results.push({
                id,
                ...quote,
                macd: macd.toFixed(2),
                score
            });
        }
    }

    // 👉 排序（最強在前）
    results.sort((a, b) => b.score - a.score);

    // 👉 顯示
    table.innerHTML = results.map(s => `
        <tr>
            <td>${s.id}</td>
            <td>${s.price}</td>
            <td class="${s.change > 0 ? 'good' : 'bad'}">${s.change}%</td>
            <td>${s.volume}</td>
            <td>${s.macd}</td>
            <td>${s.score}</td>
        </tr>
    `).join("");

}

</script>

</body>
</html>
