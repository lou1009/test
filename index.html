<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>即時掃盤（Streaming版）</title>

<style>
body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial;
    padding:20px;
}

button{
    padding:10px 20px;
    background:#22c55e;
    border:none;
    color:white;
    cursor:pointer;
}

#status{
    margin-top:10px;
    font-size:14px;
    color:#94a3b8;
}

.card{
    background:#1e293b;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border-left:4px solid #334155;
}

.good{
    border-left-color:#22c55e;
}

.bad{
    border-left-color:#ef4444;
}

.row{
    display:flex;
    justify-content:space-between;
}
.small{
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<h2>📡 即時掃盤（邊算邊顯示）</h2>
<button onclick="scan()">開始掃描</button>

<div id="status"></div>
<div id="list"></div>

<script>

// ================= 工具 =================
const delay = ms => new Promise(r=>setTimeout(r,ms));

function ema(arr,p){
    let k = 2/(p+1);
    let out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k + out[i-1]*(1-k));
    }
    return out;
}

function macd(arr){
    let e12=ema(arr,12);
    let e26=ema(arr,26);
    return e12.map((v,i)=>v-e26[i]).at(-1);
}

function score({price,change,vol,macd}){
    let s=0;
    if(macd>0)s+=40;
    if(change>0)s+=20;
    if(vol>2000)s+=20;
    if(price<=30)s+=20;
    return s;
}

// ================= API =================
async function getList(){
    let r = await fetch("https://api.finmindtrade.com/api/v4/data",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({dataset:"TaiwanStockInfo"})
    });
    let j = await r.json();
    return j.data.map(x=>x.stock_id);
}

async function quote(id){
    try{
        let r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW`);
        let j = await r.json();
        let m = j.chart.result[0].meta;

        return {
            price:m.regularMarketPrice,
            vol:m.regularMarketVolume,
            change:((m.regularMarketPrice-m.previousClose)/m.previousClose)*100
        };
    }catch{return null;}
}

async function history(id){
    try{
        let r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?range=3mo&interval=1d`);
        let j = await r.json();
        return j.chart.result[0].indicators.quote[0].close.filter(Boolean);
    }catch{return null;}
}

// ================= UI 即時更新 =================
function addCard(stock){
    let div = document.createElement("div");
    div.className = "card " + (stock.score>=60 ? "good":"bad");

    div.innerHTML = `
        <div class="row">
            <b>${stock.id}</b>
            <b>${stock.price}</b>
        </div>
        <div class="small">
            漲跌：${stock.change.toFixed(2)}% |
            MACD：${stock.macd.toFixed(2)} |
            分數：${stock.score}
        </div>
    `;

    document.getElementById("list").prepend(div);
}

// ================= 主掃描（🔥關鍵） =================
async function scan(){

    const list = await getList();
    const sample = list.slice(0,300);

    document.getElementById("list").innerHTML="";
    document.getElementById("status").innerText="開始掃描...";

    let i=0;

    for(const id of sample){

        document.getElementById("status").innerText =
            `掃描中 ${i}/${sample.length} ｜ ${id}`;

        i++;

        // 👉 並行timeout
        let q = await Promise.race([
            quote(id),
            delay(2500).then(()=>null)
        ]);

        if(!q) continue;
        if(q.price > 30) continue;

        let h = await Promise.race([
            history(id),
            delay(2500).then(()=>null)
        ]);

        if(!h || h.length<30) continue;

        let m = macd(h);

        let s = score({
            price:q.price,
            change:q.change,
            vol:q.vol,
            macd:m
        });

        if(s>=60){
            addCard({
                id,
                ...q,
                macd:m,
                score:s
            });
        }

        // 👉 每掃10支讓UI呼吸一下
        if(i%10===0){
            await delay(200);
        }
    }

    document.getElementById("status").innerText="掃描完成";
}

</script>

</body>
</html>
