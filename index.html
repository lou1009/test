<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
}

.video-box {
  position: relative;
  width: 100%;
  height: 220px;
  background: black;
}

video {
  width: 100%;
  height: 100%;
}

.live {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 5px 10px;
  font-size: 12px;
  border-radius: 6px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0.4;}
}

.list {
  display: flex;
  overflow-x: auto;
  background: #111827;
}

.btn {
  padding: 10px;
  margin: 5px;
  background: #1f2937;
  border: none;
  color: white;
  border-radius: 6px;
  flex-shrink: 0;
}

.score {
  padding: 10px;
}
</style>
</head>

<body>

<!-- 🎥 播放器 -->
<div class="video-box">
  <div class="live">LIVE</div>
  <video id="video" controls autoplay muted playsinline></video>
</div>

<!-- 🔘 動態來源 -->
<div class="list" id="list"></div>

<!-- 📊 比分 -->
<div class="score" id="score"></div>

<script>
let hls;
const video = document.getElementById("video");

/* =========================
   🎯 初始來源
========================= */
let sources = [
  "https://play1nm.hnyongshun.cn/live/bdf3e5442ef28ff31b23b47491760b27.m3u8",
  "https://play1nm.hnyongshun.cn/live/5ac950a0f8301ff31b23b47491760b27.m3u8",
  "https://play1nm.hnyongshun.cn/live/044738dfef28c9ae1ccbc6e3562961c0.m3u8"
];

/* =========================
   🎥 播放
========================= */
function play(url) {
  if (hls) hls.destroy();

  hls = new Hls();
  hls.loadSource(url);
  hls.attachMedia(video);
}

/* =========================
   🔘 生成按鈕
========================= */
function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  sources.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = "源 " + (i + 1);
    btn.onclick = () => play(s);
    list.appendChild(btn);
  });
}

/* =========================
   🔄 更新來源（核心）
   每30分鐘跑一次
========================= */
function updateSources() {
  console.log("🔄 更新直播源清單");

  // 👉 這裡模擬「新增或更新」
  const newSources = [
    "https://play1nm.hnyongshun.cn/live/bdf3e5442ef28ff31b23b47491760b27.m3u8",
    "https://play1nm.hnyongshun.cn/live/5ac950a0f8301ff31b23b47491760b27.m3u8",
    "https://play1nm.hnyongshun.cn/live/044738dfef28c9ae1ccbc6e3562961c0.m3u8",

    // 👉 假設新增來源（未來你可以替換成 API）
    "https://play1nm.hnyongshun.cn/live/c22ac2f2fbae329be1dd675554c39717.m3u8"
  ];

  // 🔥 去重（避免重複）
  sources = [...new Set(newSources)];

  renderList();
}

/* =========================
   📊 ESPN比分
========================= */
async function loadScore() {
  try {
    const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard");
    const data = await res.json();

    let html = "";

    data.events.forEach(g => {
      const c = g.competitions[0];
      const home = c.competitors.find(t => t.homeAway === "home");
      const away = c.competitors.find(t => t.homeAway === "away");

      html += `
        <div>
          ${away.team.displayName} ${away.score}
          <br>
          ${home.team.displayName} ${home.score}
          <hr>
        </div>
      `;
    });

    document.getElementById("score").innerHTML = html;

  } catch {
    document.getElementById("score").innerHTML = "比分載入失敗";
  }
}

/* =========================
   🚀 初始化
========================= */
renderList();
play(sources[0]);
loadScore();

/* =========================
   ⏱ 每30分鐘更新來源
========================= */
setInterval(updateSources, 30 * 60 * 1000);

/* =========================
   ⏱ 比分更新
========================= */
setInterval(loadScore, 10000);

</script>

</body>
</html>
