<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Live Hub</title>

<style>
:root{
  --bg:#0b0f1a;
  --card:#151c2b;
  --accent:#00cfff;
  --text:#fff;
  --muted:#9aa4b2;
  --live:#ff3b3b;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* Tabs */
.tabs{
  display:flex;
  position:sticky;
  top:0;
  background:#0f1522;
}

.tab{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
}

.tab.active{
  color:#fff;
  border-bottom:2px solid var(--accent);
}

/* Sections */
.section{
  display:none;
  padding:14px;
}

.section.active{
  display:block;
}

/* Card */
.card{
  background:var(--card);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* LIVE */
.live-badge{
  color:var(--live);
  font-weight:700;
  font-size:12px;
}

.score{
  font-size:26px;
  font-weight:700;
  margin:8px 0;
}

/* Grid */
.grid{
  display:grid;
  gap:10px;
}
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('groups')">分組</button>
  <button class="tab" onclick="showTab('schedule')">賽程</button>
  <button class="tab" onclick="showTab('live')">即時比分</button>
  <button class="tab" onclick="showTab('knockout')">淘汰賽</button>
</div>

<!-- GROUPS -->
<div id="groups" class="section active"></div>

<!-- SCHEDULE -->
<div id="schedule" class="section"></div>

<!-- LIVE -->
<div id="live" class="section"></div>

<!-- KNOCKOUT -->
<div id="knockout" class="section"></div>

<script>

const API_BASE = "https://YOUR_API_DOMAIN"; 
// 👉 改這裡 = 真實比分來源

/* ================= TAB ================= */
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

/* ================= GROUPS (本地) ================= */
function loadGroups(){
  const data = {
    A:["墨西哥","南韓","捷克","南非"],
    B:["加拿大","瑞士","卡達","波斯尼亞"],
    C:["巴西","摩洛哥","蘇格蘭","海地"]
  };

  document.getElementById("groups").innerHTML =
    Object.entries(data).map(([g,t])=>`
      <div class="card">
        <h3>Group ${g}</h3>
        <div>${t.join(" / ")}</div>
      </div>
    `).join('');
}

/* ================= SCHEDULE (API) ================= */
async function loadSchedule(){
  const el = document.getElementById("schedule");

  try{
    const res = await fetch(API_BASE + "/schedule");
    const data = await res.json();

    el.innerHTML = data.matches.map(m=>`
      <div class="card">
        <div>${m.date} ${m.time}</div>
        <b>${m.home} vs ${m.away}</b>
        <div style="color:#9aa4b2">${m.venue}</div>
      </div>
    `).join('');

  }catch(e){
    el.innerHTML = `<div class="card">⚠️ 賽程 API 未連線</div>`;
  }
}

/* ================= LIVE SCORE ================= */
async function loadLive(){
  const el = document.getElementById("live");

  try{
    const res = await fetch(API_BASE + "/live");
    const data = await res.json();

    el.innerHTML = data.matches.map(m=>`
      <div class="card">
        <div class="live-badge">${m.status} ${m.minute || ""}</div>
        <div class="score">${m.homeScore} - ${m.awayScore}</div>
        <div>${m.home} vs ${m.away}</div>
      </div>
    `).join('');

  }catch(e){
    el.innerHTML = `<div class="card">⚠️ 即時比分未連線</div>`;
  }
}

/* ================= KNOCKOUT ================= */
function loadKnockout(){
  const rounds = [
    "32強","16強","8強","4強","季軍賽","決賽"
  ];

  document.getElementById("knockout").innerHTML =
    rounds.map(r=>`
      <div class="card">
        <h3>${r}</h3>
        <div style="color:#9aa4b2">待 API 對戰樹</div>
      </div>
    `).join('');
}

/* ================= INIT ================= */
loadGroups();
loadSchedule();
loadKnockout();
loadLive();

/* auto refresh live */
setInterval(loadLive, 10000);

</script>

</body>
</html>
