<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB 大聯盟 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#001428;--navy2:#001f3f;--navy3:#002d5c;
  --red:#c0392b;--red2:#e74c3c;
  --gold:#f39c12;--grass:#2ecc71;--sky:#3498db;
  --text:#e8f0f8;--muted:#7f9bba;
  --card:rgba(0,28,56,0.88);--border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Mono','Noto Sans TC',monospace;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 10% 40%,rgba(192,57,43,.07) 0%,transparent 55%),
             radial-gradient(ellipse at 90% 20%,rgba(52,152,219,.05) 0%,transparent 50%);}
.wrap{position:relative;z-index:1;}

/* ── HEADER ── */
header{background:linear-gradient(160deg,#000e1e,#001830,#001020);border-bottom:3px solid var(--red);padding:14px 16px 10px;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
.mlb-badge{width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--red) 50%,var(--navy3) 50%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Black Han Sans',sans-serif;font-size:.9rem;color:#fff;
  border:2px solid rgba(255,255,255,.18);box-shadow:0 0 18px rgba(192,57,43,.4);}
.mlb-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.5rem,5vw,2.5rem);letter-spacing:.05em;color:#fff;line-height:1;}
.mlb-sub{font-size:.58rem;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;margin-top:2px;}
.hdr-right{text-align:right;font-size:.65rem;color:var(--muted);line-height:2;}
.live-dot{display:inline-flex;align-items:center;gap:4px;color:var(--red2);font-weight:700;}
.pulse{width:6px;height:6px;background:var(--red2);border-radius:50%;animation:blink 1s infinite;display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TICKER ── */
.ticker-wrap{overflow:hidden;background:rgba(192,57,43,.1);border-top:1px solid rgba(192,57,43,.2);padding:5px 0;}
.ticker{display:inline-flex;gap:32px;white-space:nowrap;animation:scroll 70s linear infinite;}
.ticker:hover{animation-play-state:paused;}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{font-size:.66rem;}.ti .w{color:var(--grass);font-weight:700;}.ti .l{color:var(--red2);font-weight:700;}.ti .lv{color:var(--gold);font-weight:700;}

/* ── DATE NAV ── */
.date-nav{display:flex;align-items:center;background:#00101e;border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:50;}
.date-nav::-webkit-scrollbar{display:none;}
.date-btn{flex-shrink:0;padding:9px 14px;font-family:'IBM Plex Mono',monospace;
  font-size:.65rem;color:var(--muted);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;line-height:1.5;}
.date-btn:hover{color:var(--text);}
.date-btn.active{color:#fff;border-bottom-color:var(--red);background:rgba(192,57,43,.08);}
.date-btn.today{color:var(--gold)!important;}
.date-btn.today.active{border-bottom-color:var(--gold);}
.date-sep{width:1px;height:28px;background:var(--border);flex-shrink:0;}

/* ── MAIN ── */
.main{padding:12px 12px 32px;max-width:920px;margin:0 auto;}
.sec-hdr{display:flex;align-items:center;gap:10px;font-family:'Black Han Sans',sans-serif;
  font-size:.95rem;letter-spacing:.1em;color:#fff;margin-bottom:10px;}
.sec-count{font-size:.6rem;color:var(--muted);font-weight:normal;}
.refresh-time{font-size:.52rem;color:var(--muted);margin-left:auto;}

/* ── GAME CARD ── */
.game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;backdrop-filter:blur(6px);transition:border-color .2s;
  animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.game-card.live-game{border-color:rgba(192,57,43,.5);box-shadow:0 0 16px rgba(192,57,43,.12);}
.game-card.final-game{opacity:.82;}

/* ── TOP BAR（左上角狀態）── */
.gc-topbar{display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px 5px;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap;}
.gc-status-badge{display:inline-flex;align-items:center;gap:5px;font-size:.6rem;font-weight:700;
  padding:2px 8px;border-radius:8px;letter-spacing:.05em;flex-shrink:0;}
.badge-live{color:var(--red2);background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.35);}
.badge-final{color:var(--grass);background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.25);}
.badge-sched{color:var(--sky);background:rgba(52,152,219,.08);border:1px solid rgba(52,152,219,.25);}

/* 局數 + 好壞球 inline */
.gc-game-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.gc-inning-label{font-size:.58rem;color:var(--text);font-weight:600;}
.gc-count-display{font-size:.55rem;color:var(--muted);}

/* 球數（好壞球圓點）*/
.count-dots{display:inline-flex;gap:3px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:transparent;}
.dot.ball{background:#2ecc71;border-color:#2ecc71;}
.dot.strike{background:#e74c3c;border-color:#e74c3c;}
.dot.out{width:7px;height:7px;background:#f39c12;border-color:#f39c12;}

.gc-venue{font-size:.54rem;color:var(--muted);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46%;flex:1;}

/* ── SCORE ROW ── */
.gc-score-row{display:grid;grid-template-columns:1fr 100px 1fr;align-items:center;gap:6px;padding:10px 12px 8px;}
.gc-team{display:flex;align-items:center;gap:7px;font-size:.88rem;font-weight:700;}
.gc-team.away{flex-direction:row-reverse;text-align:right;}
.team-badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.5rem;font-weight:700;flex-shrink:0;border:1px solid rgba(255,255,255,.14);}
.gc-mid{text-align:center;}
.gc-score{font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:#fff;line-height:1;letter-spacing:.04em;}
.gc-score.live{color:var(--gold);}
.gc-win-lbl{font-size:.56rem;color:var(--muted);margin-top:2px;}
.gc-win-lbl b{color:var(--grass);}
.team-pct{font-family:'IBM Plex Mono',monospace;font-size:.6rem;margin-top:3px;letter-spacing:.02em;}
.pct-lead{color:var(--grass);font-weight:700;}
.pct-trail{color:var(--muted);}
.gc-vs{font-size:.72rem;color:var(--muted);}
.gc-tw-time{font-size:.58rem;color:var(--sky);margin-top:2px;}

/* ── LINESCORE ── */
.gc-ls{padding:0 12px 6px;overflow-x:auto;scrollbar-width:none;}
.gc-ls::-webkit-scrollbar{display:none;}
.ls-skeleton{font-size:.54rem;color:var(--muted);font-style:italic;padding:4px 0;}
.ls-tbl{border-collapse:collapse;font-size:.52rem;font-family:'IBM Plex Mono',monospace;min-width:max-content;}
.ls-tbl td{padding:2px 5px;text-align:center;min-width:18px;}
.ls-tbl .ll{color:var(--muted);text-align:left;padding-right:8px;font-size:.5rem;min-width:28px;}
.ls-tbl .lh{color:var(--muted);}
.ls-tbl .lt{color:var(--gold);font-weight:700;border-left:1px solid var(--border);padding-left:6px;min-width:22px;}
.ls-tbl .lth{color:var(--muted);border-left:1px solid var(--border);padding-left:6px;}
.ls-tbl .lr{color:var(--sky);padding-left:4px;}
.ls-tbl .lrh{color:var(--muted);padding-left:4px;}
.ls-cur{background:rgba(243,156,18,.12);border-radius:2px;}

/* ── PITCHERS ── */
.gc-pit{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;
  padding:5px 12px 6px;border-top:1px solid var(--border);font-size:.6rem;}
.pit-s{color:var(--muted);line-height:1.6;}
.pit-s b{color:var(--text);font-weight:600;}
.pit-sep{text-align:center;color:rgba(255,255,255,.12);font-size:.8rem;}

/* ── PREDICT (no bar, inline only) ── */

/* ── 盤口 ML 行（第三列底部，緊湊）── */
.gc-ml-row{
  padding:4px 12px 8px;border-top:1px solid var(--border);
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;
}
.ml-away{text-align:left;}
.ml-home{text-align:right;}
.ml-val{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:700;}
.ml-val.fav{color:var(--grass);}
.ml-val.dog{color:var(--red2);}
.ml-val.even{color:var(--gold);}
.ml-center{text-align:center;}
.ml-src{font-size:.46rem;color:var(--muted);}
.ml-ou{font-size:.56rem;color:var(--muted);}
.ml-ou b{color:var(--sky);}

.tc-ATH,.tc-OAK{background:linear-gradient(135deg,#003831,#efb21e);}
.tc-LAA{background:linear-gradient(135deg,#ba0021,#003263);}
.tc-CWS{background:linear-gradient(135deg,#27251f,#c4ced4);}
.tc-SD{background:linear-gradient(135deg,#2f241d,#ffc425);}
.tc-COL{background:linear-gradient(135deg,#33006f,#c4ced4);}
.tc-MIA{background:linear-gradient(135deg,#00a3e0,#ff6600);}
.tc-WSH,.tc-WSN{background:linear-gradient(135deg,#ab0003,#14225a);}
.tc-PIT{background:linear-gradient(135deg,#27251f,#fdb827);}
.tc-CIN{background:linear-gradient(135deg,#c6011f,#000);}
.tc-AZ,.tc-ARI{background:linear-gradient(135deg,#a71930,#e3d4ad);}

.loading{text-align:center;padding:36px;color:var(--muted);}
.spinner{width:28px;height:28px;border:3px solid rgba(52,152,219,.2);border-top-color:var(--sky);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:12px;color:var(--muted);font-size:.54rem;
  letter-spacing:.07em;border-top:1px solid var(--border);margin-top:12px;line-height:2.2;}
@media(max-width:420px){.gc-score-row{grid-template-columns:1fr 80px 1fr;}.gc-score{font-size:1.4rem;}.gc-odds{grid-template-columns:1fr auto 1fr;}}
</style>

function buildTicker(){
  const done=allGames.filter(g=>g.st==='closed'||g.st==='inprogress'||g.st==='complete');
  if(!done.length)return;
  const items=done.slice(-28).map(g=>{
    const hs=g.score[g.home]??0,as=g.score[g.away]??0;
    const lv=g.st==='inprogress'?'<span class="lv">LIVE</span> ':'';
    return `<span class="ti">${lv}${g.away} <span class="${as>hs?'w':'l'}">${as}</span>-<span class="${hs>as?'w':'l'}">${hs}</span> ${g.home}</span>`;
  });
  document.getElementById('ticker').innerHTML=[...items,...items].join('');
}

async function fetchMLBDay(dt){
  if(mlbCache[dt])return mlbCache[dt];
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dt}&hydrate=probablePitcher(stats(type=season)),linescore,venue&gameType=R`);
    const d=await r.json();
    mlbCache[dt]=d.dates?.[0]?.games||[];
  }catch(e){mlbCache[dt]=[];}
  return mlbCache[dt];
}
function findMLB(g,mlbGames){
  const m=mlbGames.find(m=>m.teams?.home?.team?.abbreviation===g.home&&m.teams?.away?.team?.abbreviation===g.away);
  // 把 gamePk 存回 allGames，供 fetchGameLS 使用
  if(m&&!g._pk){
    const idx=allGames.findIndex(x=>x.home===g.home&&x.away===g.away&&x.utc===g.utc);
    if(idx>=0) allGames[idx]._pk=m.gamePk;
    g._pk=m.gamePk;
  }
  return m;
}

// ══════════════════════════════════════════════
// 好壞球 Play-by-Play（MLB Stats API）
// ══════════════════════════════════════════════
async function fetchCount(gamePk){
  if(!gamePk||countCache[gamePk]?.ts>Date.now()-15000)return;
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1/game/${gamePk}/playByPlay?fields=currentPlay,allPlays`);
    const d=await r.json();
    const cp=d.currentPlay;
    if(cp){
      countCache[gamePk]={
        balls:cp.count?.balls??0,
        strikes:cp.count?.strikes??0,
        outs:cp.count?.outs??0,
        batter:cp.matchup?.batter?.fullName||'',
        pitcher:cp.matchup?.pitcher?.fullName||'',
        ts:Date.now()
      };
    }
  }catch(e){}
}

const lsFetching=new Set();
async function fetchGameLS(pk,homeA,awayA){
  const key=`${homeA}-${awayA}`;
  if(lsFetching.has(key))return;
  lsFetching.add(key);
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1/game/${pk}/linescore`);
    const d=await r.json();
    const innings=d.innings||[];
    if(!innings.length){lsFetching.delete(key);return;}
    const sbp={};
    innings.forEach(i=>{sbp[i.num]={[homeA]:i.home?.runs??'-',[awayA]:i.away?.runs??'-'};});
    const rhe={
      [homeA]:{h:d.teams?.home?.hits??'',e:d.teams?.home?.errors??''},
      [awayA]:{h:d.teams?.away?.hits??'',e:d.teams?.away?.errors??''},
    };
    // 更新 allGames
    const idx=allGames.findIndex(g=>g.home===homeA&&g.away===awayA);
    if(idx>=0){allGames[idx].sbp=sbp;allGames[idx].rhe=rhe;}
    // 直接更新 DOM skeleton
    const el=document.getElementById(`ls-${homeA}-${awayA}`);
    if(el){
      const inns=Object.keys(sbp).sort((a,b)=>+a-+b);
      const rHm=rhe[homeA],rAw=rhe[awayA];
      const gObj=allGames[idx]||{score:{}};
      el.innerHTML=`<table class="ls-tbl">
        <tr><td class="ll"> </td>${inns.map(n=>`<td class="lh">${n}</td>`).join('')}<td class="lth">R</td><td class="lrh">H</td><td class="lrh">E</td></tr>
        <tr><td class="ll">${awayA}</td>${inns.map(n=>`<td>${sbp[n]?.[awayA]??'-'}</td>`).join('')}<td class="lt">${gObj.score[awayA]??''}</td><td class="lr">${rAw?.h??''}</td><td class="lr">${rAw?.e??''}</td></tr>
        <tr><td class="ll">${homeA}</td>${inns.map(n=>`<td>${sbp[n]?.[homeA]??'-'}</td>`).join('')}<td class="lt">${gObj.score[homeA]??''}</td><td class="lr">${rHm?.h??''}</td><td class="lr">${rHm?.e??''}</td></tr>
      </table>`;
    }
  }catch(e){}
  lsFetching.delete(key);
}

// 即時比分刷新
// ══════════════════════════════════════════════
async function refreshLive(){
  const today=todayTW();
  delete mlbCache[today];
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=linescore&gameType=R`);
    const d=await r.json();
    for(const mg of d.dates?.[0]?.games||[]){
      const ha=mg.teams?.home?.team?.abbreviation;
      const aa=mg.teams?.away?.team?.abbreviation;
      const hs=mg.teams?.home?.score??null;
      const as_=mg.teams?.away?.score??null;
      const st=mg.status?.abstractGameState;
      const det=mg.status?.detailedState||'';
      const srSt=(st==='Live'||det==='In Progress'||det==='Critical')?'inprogress':
                 (st==='Final'||st==='Completed'||det==='Final'||det==='Game Over'||det==='Completed Early')?'closed':'scheduled';
      const ls=mg.linescore;
      const idx=allGames.findIndex(g=>g.home===ha&&g.away===aa);
      if(idx>=0&&hs!==null){
        allGames[idx].score={[ha]:hs,[aa]:as_};
        allGames[idx].st=srSt;
        allGames[idx]._inn=ls?.currentInning;
        allGames[idx]._half=ls?.inningHalf;
        allGames[idx]._outs=ls?.outs;
        allGames[idx]._pk=mg.gamePk;
        if(ls?.innings){
          const sbp={};
          ls.innings.forEach(inn=>{sbp[inn.num]={[ha]:inn.home?.runs??'-',[aa]:inn.away?.runs??'-'};});
          allGames[idx].sbp=sbp;
          allGames[idx].rhe={
            [ha]:{r:hs,h:ls.teams?.home?.hits??'',e:ls.teams?.home?.errors??''},
            [aa]:{r:as_,h:ls.teams?.away?.hits??'',e:ls.teams?.away?.errors??''}
          };
        }
        // 抓好壞球
        if(srSt==='inprogress'&&mg.gamePk) fetchCount(mg.gamePk);
      }
    }
    lastRefresh=new Date().toLocaleTimeString('zh-TW',{timeZone:'Asia/Taipei'});
  }catch(e){}
  buildTicker();
  if(selectedDate===todayTW())renderMain();
}

    const pcts=[...html2.matchAll(/(\d{1,2}\.\d)%/g)].map(m=>parseFloat(m[1]));
    let loaded2=0;
    for(let i=0;i+1<slugs.length&&i/2+1<pcts.length;i+=2){
      const awayA=SLUG[slugs[i]],homeA=SLUG[slugs[i+1]];
      const ap=pcts[Math.floor(i/2)*2],hp=pcts[Math.floor(i/2)*2+1];
      if(awayA&&homeA&&ap&&hp){
        oddsCache[`${awayA}-${homeA}`]={a:ap,h:hp,src:'DRatings',ml_a:null,ml_h:null,total:null};
        loaded2++;
      }
    }
    if(loaded2>0){console.log(`✅ DRatings live: ${loaded2}`);renderMain();return;}
  }catch(e){console.warn('DRatings proxy failed:',e.message);}

  // 最終備援：靜態 DRatings
  for(const[k,v] of Object.entries(DR)){
    if(!oddsCache[k])oddsCache[k]={a:v.a,h:v.h,src:'DRatings靜態',ml_a:null,ml_h:null,total:null};
  }
  renderMain();
}

// ══════════════════════════════════════════════
// 渲染：逐局計分
// ══════════════════════════════════════════════
function renderLS(g,mlb){
  let sbp={...g.sbp};
  const ls=mlb?.linescore;
  // 從 MLB API linescore 填入
  if(!Object.keys(sbp).length&&ls?.innings?.length){
    ls.innings.forEach(i=>{sbp[i.num]={[g.home]:i.home?.runs??'-',[g.away]:i.away?.runs??'-'};});
    // 同步回 game 物件
    g.sbp=sbp;
    if(ls.teams){
      g.rhe=g.rhe||{};
      g.rhe[g.home]=g.rhe[g.home]||{h:ls.teams.home?.hits??'',e:ls.teams.home?.errors??''};
      g.rhe[g.away]=g.rhe[g.away]||{h:ls.teams.away?.hits??'',e:ls.teams.away?.errors??''};
    }
  }
  const innings=Object.keys(sbp).sort((a,b)=>+a-+b);
  // 已完賽但無逐局：觸發補抓，暫顯skeleton
  if(!innings.length&&(g.st==='closed'||g.st==='complete')){
    const pk=g._pk||mlb?.gamePk;
    if(pk) fetchGameLS(pk,g.home,g.away);
    return `<div class="gc-ls" id="ls-${g.home}-${g.away}">
      <div class="ls-skeleton">⏳ 抓取逐局記分中...</div>
    </div>`;
  }
  if(!innings.length)return '';
  const rhe=g.rhe||{};
  const hRHE=rhe[g.home]||{};const aRHE=rhe[g.away]||{};
  const curInn=g._inn;
  return `<div class="gc-ls">
    <table class="ls-tbl">
      <tr><td class="ll"> </td>${innings.map(n=>`<td class="lh">${n}</td>`).join('')}<td class="lth">R</td><td class="lrh">H</td><td class="lrh">E</td></tr>
      <tr><td class="ll">${g.away}</td>${innings.map(n=>`<td class="${n==curInn?'ls-cur':''}">${sbp[n]?.[g.away]??'-'}</td>`).join('')}<td class="lt">${g.score[g.away]??''}</td><td class="lr">${aRHE.h??''}</td><td class="lr">${aRHE.e??''}</td></tr>
      <tr><td class="ll">${g.home}</td>${innings.map(n=>`<td class="${n==curInn?'ls-cur':''}">${sbp[n]?.[g.home]??'-'}</td>`).join('')}<td class="lt">${g.score[g.home]??''}</td><td class="lr">${hRHE.h??''}</td><td class="lr">${hRHE.e??''}</td></tr>
    </table>
  </div>`;
}

// ══════════════════════════════════════════════
// 渲染：好壞球 + 好壞球圓點
// ══════════════════════════════════════════════
function countDots(n,type,filled){
  let s='';
  for(let i=0;i<n;i++)s+=`<span class="dot ${i<filled?type:''}"></span>`;
  return s;
}
function renderCount(g){
  if(g.st!=='inprogress'||!g._pk)return '';
  const c=countCache[g._pk];
  if(!c)return '';
  const balls=c.balls??0,strikes=c.strikes??0,outs=c.outs??0;
  const half=(g._half||'')==='Top'?'▲':'▼';
  const inn=g._inn||'';
  return `<div class="gc-game-info">
    <span class="gc-inning-label">${half}${inn}局</span>
    <span class="count-dots">${countDots(3,'',(outs))} </span>
    <span style="font-size:.5rem;color:var(--muted)">出局</span>
    <span class="count-dots">${countDots(4,'ball',balls)}</span>
    <span style="font-size:.5rem;color:var(--muted)">B</span>
    <span class="count-dots">${countDots(3,'strike',strikes)}</span>
    <span style="font-size:.5rem;color:var(--muted)">S</span>
    ${c.batter?`<span style="font-size:.52rem;color:var(--muted)">${c.batter}</span>`:''}
  </div>`;
}

// ══════════════════════════════════════════════
// 渲染：ML 盤口行（底部，只顯示 ML，勝率在第二列）
// ══════════════════════════════════════════════
function getOdds(awayA,homeA){ return oddsCache[`${awayA}-${homeA}`]||null; }

function renderMLRow(awayA,homeA){
  const od=getOdds(awayA,homeA);
  if(!od||od.ml_a==null) return ''; // 無 ML 不顯示此行
  return `<div class="gc-ml-row">
    <div class="ml-away"><span class="ml-val ${mlClass(od.ml_a)}">${fmtML(od.ml_a)}</span></div>
    <div class="ml-center">
      ${od.total!=null?`<div class="ml-ou">O/U <b>${od.total}</b></div>`:''}
      <div class="ml-src">${od.src}</div>
    </div>
    <div class="ml-home"><span class="ml-val ${mlClass(od.ml_h)}">${fmtML(od.ml_h)}</span></div>
  </div>`;
}

// 勝率%供 score row 使用
function getPct(awayA,homeA){
  const od=getOdds(awayA,homeA);
  if(!od) return null;
  return {a:Math.max(od.a,4), h:Math.max(od.h,4), src:od.src};
}

// ══════════════════════════════════════════════
// 渲染：卡片
// ══════════════════════════════════════════════
function renderCard(g,mlb,delay){
  const {home,away,st,score,utc}=g;
  const ht=ti(home),at=ti(away);
  const hs=score[home]??null,as_=score[away]??null;

  // 左上角狀態 badge
  let badge='';
  const half=(g._half||'')==='Top'?'▲':'▼';
  const inn=g._inn||'';
  if(st==='inprogress'){
    // 局數簡短版放 badge 旁
    badge=`<span class="gc-status-badge badge-live"><span class="pulse"></span>進行中</span>`;
  } else if(st==='closed'||st==='complete'){
    badge=`<span class="gc-status-badge badge-final">✅ 已完賽</span>`;
  } else {
    badge=`<span class="gc-status-badge badge-sched">🕐 未開賽</span>`;
  }

  // 局數 + 好壞球（進行中才顯示）
  const countHtml=renderCount(g);
  const innHtml=(st==='inprogress'&&!countHtml&&inn)?`<span class="gc-inning-label">${half}${inn}局</span>`:'';

  // 開賽時間（待賽才顯示）
  const schedInfo=st==='scheduled'?`<span style="font-size:.55rem;color:var(--sky);">${twDateLbl(utc)} ${twTime(utc)}</span>`:'';

  const venue=mlb?.venue?.name||ht.venue||'';

  // 比分
  let scoreHTML='';
  if(st==='inprogress'){
    scoreHTML=`<div class="gc-score live">${as_??0} - ${hs??0}</div>`;
  }else if(st==='closed'||st==='complete'){
    scoreHTML=`<div class="gc-score">${as_} - ${hs}</div>
      <div class="gc-win-lbl">${hs>as_?`<b>${ht.zh}</b> 勝`:`<b>${at.zh}</b> 勝`}</div>`;
  }else{
    scoreHTML=`<div class="gc-vs">VS</div><div class="gc-tw-time">${twTime(utc)}</div>`;
  }

  // 勝率%（第二列使用）
  const pct=getPct(away,home);

  // 先發投手
  let pitHTML='';
  const ap_=mlb?.teams?.away?.probablePitcher;
  const hp_=mlb?.teams?.home?.probablePitcher;
  if(ap_||hp_){
    const pBlk=(p,lbl)=>{
      if(!p)return `<div class="pit-s">${lbl}：<b style="color:var(--muted)">TBD</b></div>`;
      const s=p.stats?.find(x=>x.type?.displayName==='season')?.splits?.[0]?.stat||{};
      return `<div class="pit-s">${lbl}：<b>${p.fullName}</b><br>${s.wins??0}勝${s.losses??0}敗 ERA ${s.era??'-.--'}</div>`;
    };
    pitHTML=`<div class="gc-pit">${pBlk(ap_,at.zh)}<div class="pit-sep">⚾</div>${pBlk(hp_,ht.zh)}</div>`;
  }

  return `<div class="game-card${st==='inprogress'?' live-game':(st==='closed'||st==='complete')?' final-game':''}" style="animation-delay:${delay}ms">
    <div class="gc-topbar">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        ${badge}
        ${countHtml||innHtml}
        ${schedInfo}
      </div>
      <div class="gc-venue">🏟 ${venue}</div>
    </div>
    <div class="gc-score-row">
      <div class="gc-team away">
        <div class="team-badge ${tc(away)}">${away}</div>
        <div>
          <div>${at.zh}</div>
          <div style="font-size:.5rem;color:var(--muted)">${away}</div>
          ${pct?`<div class="team-pct ${pct.a>=pct.h?'pct-lead':'pct-trail'}">${pct.a>=pct.h?'⭐ ':''}${pct.a}%</div>`:''}
        </div>
      </div>
      <div class="gc-mid">${scoreHTML}</div>
      <div class="gc-team">
        <div class="team-badge ${tc(home)}">${home}</div>
        <div>
          <div>${ht.zh}</div>
          <div style="font-size:.5rem;color:var(--muted)">${home}</div>
          ${pct?`<div class="team-pct ${pct.h>pct.a?'pct-lead':'pct-trail'}">${pct.h>pct.a?'⭐ ':''}${pct.h}%</div>`:''}
        </div>
      </div>
    </div>
    ${renderLS(g,mlb)}
    ${pitHTML}
    ${renderMLRow(away,home)}
  </div>`;
}

// ══════════════════════════════════════════════
// 主渲染
// ══════════════════════════════════════════════
async function renderMain(){
  const mc=document.getElementById('main-content');
  let games=allGames.filter(g=>twISO(g.utc)===selectedDate);
  const mlbDay=await fetchMLBDay(selectedDate);

  if(!games.length&&!mlbDay.length){
    mc.innerHTML=`<div style="text-align:center;padding:28px;color:var(--muted);">此日期無比賽</div>`;return;
  }

  const ord={inprogress:0,scheduled:1,closed:2,complete:2};
  games=[...games].sort((a,b)=>(ord[a.st]??1)-(ord[b.st]??1)||(new Date(a.utc)-new Date(b.utc)));

  let html='';let count=0;
  if(games.length){
    games.forEach((g,i)=>{html+=renderCard(g,findMLB(g,mlbDay),i*30);count++;});
  }else{
    mlbDay.forEach((m,i)=>{
      const ha=m.teams?.home?.team?.abbreviation||'';
      const aa=m.teams?.away?.team?.abbreviation||'';
      html+=renderCard({st:'scheduled',utc:m.gameDate,home:ha,away:aa,score:{},sbp:{},rhe:{}},m,i*30);
      count++;
    });
  }

  const label=new Date(selectedDate+'T12:00:00+08:00').toLocaleDateString('zh-TW',{timeZone:'Asia/Taipei',month:'long',day:'numeric',weekday:'long'});
  mc.innerHTML=`<div class="sec-hdr">⚾ ${label}<span class="sec-count">${count} 場</span><span class="refresh-time">${lastRefresh?'更新 '+lastRefresh:''}</span></div>${html}`;
}

// ══════════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════════
async function init(){
  const dateSet=new Set();
  for(const g of allGames)dateSet.add(twISO(g.utc));
  const today=todayTW();
  for(let i=0;i<4;i++)dateSet.add(addDay(today,i));
  const dates=[...dateSet].filter(Boolean).sort();
  selectedDate=dates.includes(today)?today:(dates.find(d=>d>=today)||dates[0]);
  buildDateNav(dates);
  buildTicker();
  await renderMain();
  fetchOdds();
  setInterval(refreshLive,30000);
  setInterval(fetchOdds,30*60*1000);
}
init();
</script>
